<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART DEALS AI | THE POWER BOT 2100</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --cyan: #00f2ff; --dark: #020202; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        /* قشرة الروبوت - الخلفية المتحركة */
        .robot-shell { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://i.imgur.com/uRk0Zc7.png'); 
            background-size: cover; opacity: 0.1; filter: grayscale(1); }

        /* نظام الإشعارات العصبية */
        #neural-pulse { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px;
            background: var(--gold); color: #000; padding: 15px; border-radius: 0 0 20px 20px; z-index: 9999;
            font-weight: 900; text-align: center; box-shadow: 0 0 40px var(--gold); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* كروت القوة */
        .power-card { background: rgba(15, 15, 15, 0.95); border: 1px solid #333; border-radius: 25px;
            padding: 20px; transition: 0.5s; position: relative; overflow: hidden; backdrop-filter: blur(15px); }
        .power-card:hover { border-color: var(--gold); transform: translateY(-15px); box-shadow: 0 0 50px rgba(255, 204, 0, 0.2); }

        .img-container { height: 220px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-height: 100%; filter: drop-shadow(0 0 15px var(--cyan)); animation: hover-float 4s infinite ease-in-out; }
        @keyframes hover-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* زر إحجز الآن - القوة المطلقة */
        .btn-reserve { background: var(--gold); color: #000; font-weight: 900; border-radius: 50px; border: none;
            padding: 15px; box-shadow: 0 0 20px var(--gold); transition: 0.3s; width: 100%; }
        .btn-reserve:hover { transform: scale(1.05); box-shadow: 0 0 40px var(--gold); background: #fff; }

        /* واجهة Gemini الذكية */
        .gemini-interface { border-left: 5px solid var(--cyan); background: rgba(0, 242, 255, 0.05); padding: 20px; border-radius: 0 20px 20px 0; }
    </style>
</head>
<body>
    <div class="robot-shell"></div>
    <div id="neural-pulse">⚡ تنبيه عصبي: متبقي قطعتين فقط من العرض الأخير في طنجة!</div>

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 style="color: var(--gold); font-weight: 900; text-shadow: 0 0 20px var(--gold);">SMART DEALS AI</h1>
            <p class="small text-uppercase" style="letter-spacing: 5px;">Power Bot v9.0 | 2100 Era</p>
        </header>

        <div class="gemini-interface mb-5">
            <h5 class="text-info">📡 محلل الصفقات الذكي</h5>
            <p id="aiLog" class="small text-white-50">"الروبوت مستعد.. أدخل ميزانيتك لنبدأ عملية الفحص."</p>
            <div class="input-group">
                <input type="text" id="userInput" class="form-control bg-dark text-white border-info" placeholder="مثلاً: هاتف بـ 3000...">
                <button class="btn btn-info px-4" onclick="executePower()">تحليل</button>
            </div>
        </div>

        <div id="matrix" class="row g-4"></div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Redmi Note 13 Pro+", price: "4200 DH", img: "phone.jpg", desc: "كاميرا 200MP | شحن 120W" },
            { id: 2, name: "Redmi Note 13 Pro", price: "3100 DH", img: "https://i.imgur.com/6XzW9vS.png", desc: "الأداء المتوازن للروبوتات" },
            { id: 3, name: "Redmi Note 13", price: "2100 DH", img: "https://i.imgur.com/vH9v5Z7.png", desc: "القوة الاقتصادية المثالية" }
        ];

        function renderBot() {
            const grid = document.getElementById('matrix');
            grid.innerHTML = products.map(p => `
                <div class="col-md-4">
                    <div class="power-card text-center">
                        <div class="img-container">
                            <img src="${p.img}" class="product-img img-fluid" onerror="this.src='https://i.imgur.com/9S5F3l6.png'">
                        </div>
                        <div class="stars my-3" style="color:var(--gold)">⭐⭐⭐⭐⭐</div>
                        <h4 class="fw-bold">${p.name}</h4>
                        <p class="text-info small">${p.desc}</p>
                        <h2 class="fw-bold mb-4" style="color:var(--gold)">${p.price}</h2>
                        <a href="https://wa.me/212632997956?text=حجز الهاتف الذكي: ${p.name}" class="btn btn-reserve">إحجز الآن</a>
                    </div>
                </div>
            `).join('');
        }

        function executePower() {
            const val = document.getElementById('userInput').value;
            const log = document.getElementById('aiLog');
            log.innerHTML = "<span class='text-warning'>جاري سحب البيانات من السحابة...</span>";
            setTimeout(() => {
                log.innerText = "💡 الروبوت يقترح عليك Redmi Note 13 Pro+ كأقوى خيار متاح حالياً.";
            }, 1000);
        }

        // تفعيل الإشعار العصبي
        window.onload = () => {
            renderBot();
            setTimeout(() => { document.getElementById('neural-pulse').style.top = '0'; }, 3000);
            setTimeout(() => { document.getElementById('neural-pulse').style.top = '-100px'; }, 8000);
        };
    </script>
</body>
</html>
