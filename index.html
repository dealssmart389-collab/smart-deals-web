<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Sovereign Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* الألوان والخطوط الأصلية */
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --fb-hover: #3a3b3c; --neon: #00ff41; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 60px; }
        /* الهيدر الأصلي */
        .navbar { background: var(--fb-card); height: 56px; border-bottom: 1px solid #3e4042; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--fb-blue); font-size: 24px; font-weight: bold; }
        /* أيقونات البحث والقائمة */
        .nav-right { display: flex; gap: 10px; }
        .icon-btn { background: var(--fb-hover); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--fb-text); }
        .container { max-width: 500px; margin: auto; padding: 8px; }
        /* شريط القصص (المشاريع) */
        .stories { display: flex; gap: 8px; padding: 10px 0; overflow-x: auto; scrollbar-width: none; }
        .story-card { min-width: 110px; height: 180px; background: var(--fb-card); border-radius: 12px; border: 1px solid #3e4042; position: relative; overflow: hidden; flex-shrink: 0; }
        .story-icon { position: absolute; top: 10px; left: 10px; background: var(--fb-blue); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--fb-card); }
        /* منشور تيمو الأصلي */
        .post-card { background: var(--fb-card); border-radius: 8px; padding: 12px; margin-top: 15px; border: 1px solid #3e4042; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .avatar-circle { width: 40px; height: 40px; background: var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
        .terminal-box { background: black; border-radius: 6px; padding: 15px; font-family: monospace; color: var(--neon); font-size: 13px; line-height: 1.5; border: 1px solid #333; }
        /* شريط التفاعل السفلي */
        .post-footer { display: flex; justify-content: space-around; padding-top: 10px; border-top: 1px solid #3e4042; margin-top: 10px; color: #b0b3b8; font-size: 14px; }
        /* القائمة الجانبية الأصلية */
        .sidebar { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: var(--fb-bg); z-index: 2000; transition: 0.3s; padding: 20px; box-sizing: border-box; }
        .sidebar.active { right: 0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="icon-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        <div class="logo">BenalalAI</div>
        <div class="nav-right">
            <div class="icon-btn"><i class="fas fa-search"></i></div>
        </div>
    </nav>
    <div class="container">
        <div class="stories">
            <div class="story-card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1c1d1f;">
                <i class="fas fa-plus-circle" style="color:var(--fb-blue); font-size:30px;"></i>
                <span style="font-size:12px; margin-top:10px;">إضافة مشروع</span>
            </div>
            <div class="story-card">
                <div class="story-icon"><i class="fas fa-shopping-cart" style="font-size:12px;"></i></div>
                <div style="position:absolute; bottom:10px; width:100%; text-align:center; font-size:12px;">Smart Deals</div>
            </div>
            <div class="story-card">
                <div class="story-icon" style="background:var(--fb-hover);"><i class="fas fa-car" style="font-size:12px;"></i></div>
                <div style="position:absolute; bottom:10px; width:100%; text-align:center; font-size:12px;">Driving AI</div>
            </div>
        </div>
        <div class="post-card">
            <div class="post-header">
                <div class="avatar-circle">T</div>
                <div>
                    <strong>تيمو (TIMO AI)</strong><br>
                    <small>نشط الآن • <i class="fas fa-globe-americas"></i></small>
                </div>
            </div>
            <div class="terminal-box">
                > نظام بن علال السيادي v2.0 متصل...<br>
                > تم تحليل تقرير Bandit بنجاح.<br>
                > بانتظار أوامرك يا قائد...
            </div>
            <div class="post-footer">
                <span><i class="far fa-thumbs-up"></i> أعجبني</span>
                <span><i class="far fa-comment"></i> تعليق</span>
                <span><i class="fas fa-share"></i> مشاركة</span>
            </div>
        </div>
    </div>
    <div class="sidebar" id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <i class="fas fa-cog"></i>
            <h3 style="margin:0;">القائمة</h3>
            <i class="fas fa-times" onclick="toggleMenu()"></i>
        </div>
        <div style="background:var(--fb-card); padding:15px; border-radius:10px; display:flex; align-items:center; gap:12px;">
            <div class="avatar-circle" style="background:var(--neon);">M</div>
            <strong>منير بن علال (القائد)</strong>
        </div>
    </div>
    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    </script>
</body>
</html>
