<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - The Original Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --fb-hover: #3a3b3c; --neon: #00ff41; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 56px; overflow-x: hidden; }
        /* Navbar فيسبوك الأصلية - ثابتة للأبد */
        .navbar { background: var(--fb-card); height: 56px; border-bottom: 1px solid #3e4042; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--fb-blue); font-size: 24px; font-weight: bold; letter-spacing: -1px; }
        /* منطقة القصص - (إضافة طبق الأصل) */
        .stories-container { display: flex; gap: 8px; padding: 10px; overflow-x: auto; scrollbar-width: none; background: var(--fb-bg); }
        .story-card { min-width: 100px; height: 170px; background: var(--fb-card); border-radius: 10px; position: relative; border: 1px solid #3e4042; overflow: hidden; }
        .story-avatar { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; border: 3px solid var(--fb-blue); border-radius: 50%; background: var(--neon); z-index: 2; }
        .story-name { position: absolute; bottom: 8px; right: 8px; font-size: 12px; font-weight: bold; color: white; z-index: 2; }
        /* منطقة المنشورات الأصلية */
        .container { max-width: 500px; margin: auto; padding: 8px; }
        .post-card { background: var(--fb-card); border-radius: 8px; margin-bottom: 12px; border: 1px solid #3e4042; padding: 12px; }
        .avatar { width: 40px; height: 40px; background: var(--neon); border-radius: 50%; }
        /* القائمة الجانبية المعتمدة */
        .sidebar { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: var(--fb-bg); z-index: 2000; transition: 0.3s ease; padding: 15px; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        .fb-icon { color: #b0b3b8; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">BenalalAI</div>
        <div style="display: flex; gap: 20px;">
            <i class="fas fa-search fb-icon"></i>
            <i class="fas fa-bars fb-icon" onclick="toggleMenu()"></i>
        </div>
    </nav>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0;">القائمة</h2>
            <i class="fas fa-cog fb-icon" onclick="toggleMenu()"></i>
        </div>
        <div style="background: var(--fb-card); padding: 15px; border-radius: 10px; display: flex; align-items: center; gap: 12px;">
            <div class="avatar"></div>
            <strong>منير بن علال (القائد)</strong>
        </div>
    </div>
    <div class="stories-container">
        <div class="story-card">
            <div class="story-avatar" style="background: var(--fb-blue); border-color: white; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus" style="color:white; font-size:14px;"></i></div>
            <div style="width:100%; height:110px; background:#3a3b3c;"></div>
            <div class="story-name">إضافة قصة</div>
        </div>
        <div class="story-card">
            <div class="story-avatar"></div>
            <div style="width:100%; height:100%; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.7)), url('https://via.placeholder.com/100x170/1877f2/ffffff?text=Smart+Deals'); background-size: cover;"></div>
            <div class="story-name">Smart Deals</div>
        </div>
    </div>
    <div class="container">
        <div class="post-card">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="avatar"></div>
                <input type="text" placeholder="بماذا تفكر يا منير؟" style="background:var(--fb-hover); border:none; border-radius:20px; padding:10px; color:white; flex:1;">
            </div>
        </div>
        <div class="post-card">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                <div class="avatar"></div>
                <div><strong>تيمو (TIMO AI)</strong><br><small>نشط الآن • <i class="fas fa-globe-americas"></i></small></div>
            </div>
            <p>تم تثبيت النواة الأصلية بنجاح. المهام الحالية: الحفاظ على التصميم وتطوير الخصائص تدريجياً.</p>
        </div>
    </div>
    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    </script>
</body>
</html>
