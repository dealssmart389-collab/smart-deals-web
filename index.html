<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Ultimate Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-bg: #18191a; --fb-card: #242526; --fb-blue: #2d88ff; --fb-text: #e4e6eb; --neon: #00ff41; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: Arial, sans-serif; margin: 0; }
        /* 1. نظام الحماية (Lock Screen) */
        #lockScreen { position: fixed; inset: 0; background: var(--fb-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .lock-box { background: var(--fb-card); padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #3e4042; }
        /* 2. الهيدر والتبويبات (BenalalAI UI) */
        .app-main { display: none; }
        .header { background: var(--fb-card); height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; position: fixed; top:0; width:100%; z-index: 1000; box-sizing: border-box; }
        .tabs { background: var(--fb-card); display: flex; position: fixed; top: 56px; width: 100%; border-bottom: 1px solid #3e4042; z-index: 1000; }
        .tab { flex: 1; height: 48px; display: flex; align-items: center; justify-content: center; color: #b0b3b8; font-size: 22px; cursor: pointer; }
        .tab.active { color: var(--fb-blue); border-bottom: 3px solid var(--fb-blue); }
        /* 3. المحتوى المتراكم (Marketplace + Timo) */
        .content { margin-top: 110px; padding: 12px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .page { display: none; }
        .page.active { display: block; }
        /* كروت الماركت بليس */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--fb-card); border-radius: 8px; height: 250px; position: relative; border: 1px solid #3e4042; overflow: hidden; }
        .price-tag { position: absolute; bottom: 8px; right: 8px; text-align: right; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px; }
        /* شاشة تيمو (Core Terminal) */
        .terminal { background: black; border-radius: 8px; padding: 15px; font-family: monospace; color: var(--neon); height: 300px; overflow-y: auto; border: 1px solid #333; }
        .cmd-input { width: 100%; background: var(--fb-card); border: 1px solid #3e4042; color: white; padding: 12px; border-radius: 20px; margin-top: 10px; outline: none; }
    </style>
</head>
<body>
    <div id="lockScreen">
        <div class="lock-box">
            <i class="fas fa-shield-alt" style="font-size: 40px; color: var(--fb-blue);"></i>
            <h3>BenalalAI Secure</h3>
            <input type="password" id="pass" placeholder="Password" style="padding:10px; border-radius:5px; border:none; text-align:center;">
            <button onclick="unlock()" style="margin-top:10px; background:var(--fb-blue); color:white; border:none; padding:10px 20px; border-radius:5px;">دخول</button>
        </div>
    </div>
    <div class="app-main" id="app">
        <div class="header">
            <div style="display:flex; gap:10px;"><i class="fas fa-bars"></i><i class="fas fa-search"></i></div>
            <div style="color:var(--fb-blue); font-size:22px; font-weight:bold;">BenalalAI</div>
        </div>
        <div class="tabs">
            <div class="tab" onclick="showPage('home', this)"><i class="fas fa-home"></i></div>
            <div class="tab active" onclick="showPage('market', this)"><i class="fas fa-store"></i></div>
            <div class="tab" onclick="showPage('timo', this)"><i class="fas fa-microchip"></i></div>
            <div class="tab" onclick="showPage('notif', this)"><i class="fas fa-bell"></i></div>
        </div>
        <div class="content">
            <div id="market" class="page active">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <span style="font-size:20px; font-weight:bold;">Marketplace</span>
                    <i class="fas fa-user-circle" style="color:var(--fb-blue); font-size:20px;"></i>
                </div>
                <div class="grid">
                    <div class="card"><div class="price-tag"><b>MAD 150</b><br><small>تخفيضات Smart Deals</small></div></div>
                    <div class="card"><div class="price-tag"><b>مجاناً</b><br><small>أداة Timo AI المحدثة</small></div></div>
                </div>
            </div>
            <div id="timo" class="page">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                    <div style="width:35px; height:35px; background:var(--neon); border-radius:50%;"></div>
                    <strong>تيمو (TIMO AI) - النواة</strong>
                </div>
                <div class="terminal" id="out">> بانتظار الأوامر السيادية يا قائد...</div>
                <input type="text" id="in" class="cmd-input" placeholder="اكتب أمراً لـ Termux..." onkeypress="if(event.key==='Enter') run()">
            </div>
        </div>
    </div>
    <script>
        function unlock() {
            if(document.getElementById('pass').value === '2026') {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        }
        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        async function run() {
            const i = document.getElementById('in'), o = document.getElementById('out');
            o.innerHTML += `<br><span style="color:white;">$ ${i.value}</span>`;
            try {
                const r = await fetch('http://localhost:5000/exec', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: i.value})
                });
                const d = await r.json();
                o.innerHTML += `<br>${d.output}`;
            } catch { o.innerHTML += "<br>!! Connection Error !!"; }
            o.scrollTop = o.scrollHeight; i.value = "";
        }
    </script>
</body>
</html>
