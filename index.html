<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SOVEREIGN SOURCE | القوة الخالدة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --cyan: #00f2ff; --void: #000205; }
        body { background: var(--void); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; padding-top: 80px; }

        /* شريط التحكم الحي */
        .neural-nav { background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-bottom: 2px solid var(--cyan); 
            padding: 15px; position: fixed; top: 0; width: 100%; z-index: 2000; display: flex; justify-content: space-around; }
        .nav-icon { font-size: 1.6rem; color: var(--cyan); cursor: pointer; transition: 0.3s; }
        .nav-icon:hover { color: var(--gold); transform: scale(1.2); }

        /* نظام الصفحات العصبية (Overlays) */
        .page-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            padding: 30px; border: 2px solid var(--gold); border-radius: 30px; margin: 15px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* زر الصاعقة (محرك القوة) */
        .bolt-engine { position: fixed; bottom: 30px; left: 30px; width: 70px; height: 70px; 
            background: var(--gold); border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; color: #000; font-size: 1.8rem; z-index: 2500;
            box-shadow: 0 0 30px var(--gold); cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px var(--gold); } 50% { transform: scale(1.1); box-shadow: 0 0 50px var(--gold); } 100% { transform: scale(1); } }

        .product-card { background: #0a0a0a; border: 1px solid #222; border-radius: 25px; padding: 20px; transition: 0.4s; }
        .product-card:hover { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
    </style>
</head>
<body>

    <div class="neural-nav">
        <i class="fas fa-user-circle nav-icon" onclick="togglePage('profile')"></i>
        <i class="fas fa-sync-alt nav-icon" onclick="systemSync()"></i>
        <i class="fas fa-shopping-cart nav-icon" onclick="togglePage('cart')"></i>
        <i class="fas fa-cog nav-icon" onclick="togglePage('settings')"></i>
    </div>

    <div id="profile" class="page-overlay">
        <h2 class="text-warning mb-4">ملف الهوية السيادية</h2>
        <div class="p-4 border border-info rounded-4 w-100">
            <p>المستخدم: <b>إمبراطور طنجة</b></p>
            <p>الرصيد الكوانتي: <span class="text-info">99,000 DH</span></p>
        </div>
        <button class="btn btn-danger mt-5 rounded-pill px-5" onclick="togglePage('profile')">إغلاق البوابة</button>
    </div>

    <div id="settings" class="page-overlay">
        <h2 class="text-cyan mb-4">إعدادات النواة</h2>
        <div class="text-start w-100">
            <p>✅ تشفير البيانات: نشط</p>
            <p>✅ حماية المحفظة: قصوى</p>
        </div>
        <button class="btn btn-outline-light mt-5" onclick="togglePage('settings')">العودة للمنصة</button>
    </div>

    <div class="container text-center mt-4">
        <div class="p-4 border border-warning rounded-5 mb-5" style="background: rgba(255,204,0,0.02);">
            <h2 class="text-warning">NEURAL PAY | بوابة الدفع</h2>
            <p class="small text-muted">اضغط لإتمام عملية الشحن الفوري</p>
            <button class="btn btn-danger btn-lg rounded-pill px-5" onclick="runPayment()">إتمام الدفع الكوني</button>
        </div>

        <h3 class="text-cyan mb-4 text-end">📱 مخزن الشركات العالمية</h3>
        <div class="row g-4" id="app-engine"></div>
    </div>

    <div class="bolt-engine" onclick="checkCoreStatus()"><i class="fas fa-bolt"></i></div>

    <script>
        // وظائف النبض الحقيقية
        function togglePage(id) {
            const p = document.getElementById(id);
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        }

        function systemSync() {
            alert("جاري سحب التحديثات من السحابة السيادية...");
            location.reload();
        }

        function runPayment() {
            const val = prompt("أدخل قيمة الشحن بالدرهم:");
            if(val) alert("تم تأكيد العملية! " + val + " DH في طريقها لمحفظتك.");
        }

        function checkCoreStatus() {
            alert("النظام: مستقر | النبض: مفعل | القوة: 100%");
        }

        const products = [
            { name: "Redmi Note 13 Pro+", price: "4200 DH", brand: "XIAOMI" },
            { name: "S24 Ultra Quantum", price: "11500 DH", brand: "SAMSUNG" }
        ];

        document.getElementById('app-engine').innerHTML = products.map(p => `
            <div class="col-md-6">
                <div class="product-card">
                    <span class="badge bg-info mb-2">${p.brand}</span>
                    <h4 class="text-white">${p.name}</h4>
                    <h2 class="text-warning">${p.price}</h2>
                    <button class="btn btn-warning w-100 rounded-pill mt-3 fw-bold" onclick="alert('تم حجز ${p.name}')">شراء فوري</button>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
