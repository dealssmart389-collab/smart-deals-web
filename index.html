<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Sovereign OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --fb-hover: #3a3b3c; --neon: #00ff41; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 105px; overflow-x: hidden; }
        .header-fixed { position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--fb-card); }
        .navbar-top { height: 56px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; }
        .logo { color: var(--fb-blue); font-size: 24px; font-weight: bold; letter-spacing: -1px; }
        /* التبويبات المعتمدة */
        .nav-tabs { display: flex; height: 48px; border-bottom: 1px solid #3e4042; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; color: #b0b3b8; font-size: 20px; cursor: pointer; position: relative; transition: 0.3s; }
        .tab.active { color: var(--fb-blue); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 3px; background: var(--fb-blue); }
        .icon-circle { background: var(--fb-hover); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--fb-text); cursor: pointer; }
        .container { max-width: 500px; margin: auto; padding: 8px; }
        /* تصميم منشور الفيديو (طبق الأصل) */
        .video-card { background: var(--fb-card); border-radius: 8px; margin-bottom: 12px; border: 1px solid #3e4042; overflow: hidden; }
        .video-placeholder { width: 100%; height: 280px; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .play-btn { position: absolute; font-size: 50px; color: rgba(255,255,255,0.8); }
        .post-info { padding: 12px; }
        .avatar { width: 40px; height: 40px; background: var(--neon); border-radius: 50%; border: 1px solid #3e4042; }
        /* القائمة الجانبية */
        .sidebar { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: var(--fb-bg); z-index: 2000; transition: 0.3s ease; padding: 15px; box-sizing: border-box; }
        .sidebar.active { right: 0; }
    </style>
</head>
<body>
    <div class="header-fixed">
        <nav class="navbar-top">
            <div class="logo">BenalalAI</div>
            <div style="display: flex; gap: 10px;">
                <div class="icon-circle"><i class="fas fa-search"></i></div>
                <div class="icon-circle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
            </div>
        </nav>
        <div class="nav-tabs">
            <div class="tab" onclick="location.reload()"><i class="fas fa-home"></i></div>
            <div class="tab active"><i class="fas fa-tv"></i></div>
            <div class="tab"><i class="fas fa-store"></i></div>
            <div class="tab"><i class="fas fa-bell"></i></div>
        </div>
    </div>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>القائمة</h2>
            <i class="fas fa-times" style="font-size: 24px;" onclick="toggleMenu()"></i>
        </div>
        <div style="background: var(--fb-card); padding: 15px; border-radius: 10px; display: flex; align-items: center; gap: 12px; margin-top:20px;">
            <div class="avatar"></div>
            <strong>منير بن علال (القائد)</strong>
        </div>
    </div>
    <div class="container" id="main-content">
        <h3 style="padding: 10px 5px; margin: 0;">Watch</h3>
        <div class="video-card">
            <div class="post-info" style="display: flex; align-items: center; gap: 10px;">
                <div class="avatar"></div>
                <div><strong>Smart Deals TV</strong><br><small>منذ ٥ ساعات • <i class="fas fa-globe-americas"></i></small></div>
            </div>
            <div class="video-placeholder">
                <i class="fas fa-play play-btn"></i>
                <div style="color: #555;">[فيديو مشروع Smart Deals]</div>
            </div>
            <div class="post-info" style="border-top: 1px solid #3e4042; display: flex; justify-content: space-around; color: #b0b3b8;">
                <span><i class="far fa-thumbs-up"></i> أعجبني</span>
                <span><i class="far fa-comment"></i> تعليق</span>
                <span><i class="fas fa-share"></i> مشاركة</span>
            </div>
        </div>
        <div class="video-card">
            <div class="post-info" style="display: flex; align-items: center; gap: 10px;">
                <div class="avatar"></div>
                <div><strong>Timo AI Labs</strong><br><small>منذ يوم • <i class="fas fa-globe-americas"></i></small></div>
            </div>
            <div class="video-placeholder">
                <i class="fas fa-play play-btn"></i>
                <div style="color: #555;">[عرض تقنيات القيادة الآلية]</div>
            </div>
        </div>
    </div>
    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    </script>
</body>
</html>
