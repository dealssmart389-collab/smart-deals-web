<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Secure Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --neon: #00ff41; --error: #f02849; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        /* شاشة القفل */
        #lockScreen { position: fixed; inset: 0; background: var(--fb-bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .lock-card { background: var(--fb-card); padding: 30px; border-radius: 12px; border: 1px solid #3e4042; width: 100%; max-width: 350px; text-align: center; }
        .lock-input { width: 100%; background: var(--fb-hover); border: 1px solid #3e4042; padding: 12px; color: white; border-radius: 8px; margin: 20px 0; text-align: center; font-size: 18px; outline: none; }
        .unlock-btn { background: var(--fb-blue); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        /* الواجهة الرئيسية (مخفية افتراضياً) */
        #mainApp { display: none; padding-top: 60px; }
        .navbar { background: var(--fb-card); height: 56px; border-bottom: 1px solid #3e4042; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--fb-blue); font-size: 22px; font-weight: bold; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .terminal-box { background: black; border-radius: 8px; padding: 15px; font-family: monospace; color: var(--neon); height: 300px; overflow-y: auto; border: 1px solid #333; margin-bottom: 15px; font-size: 13px; }
        .input-area { display: flex; gap: 10px; background: var(--fb-card); padding: 10px; border-radius: 25px; border: 1px solid #3e4042; align-items: center; }
        input { flex: 1; background: none; border: none; color: white; outline: none; }
    </style>
</head>
<body>
    <div id="lockScreen">
        <div class="lock-card">
            <div style="font-size: 40px; color: var(--fb-blue); margin-bottom: 10px;"><i class="fas fa-user-shield"></i></div>
            <h2 style="margin: 0; font-size: 20px;">نظام بن علال المحصن</h2>
            <p style="color: #b0b3b8; font-size: 13px;">أدخل شفرة العبور للوصول للسيادة</p>
            <input type="password" id="passCode" class="lock-input" placeholder="••••">
            <button class="unlock-btn" onclick="verifyAccess()">فتح النظام</button>
            <p id="errMsg" style="color: var(--error); font-size: 12px; margin-top: 10px; display: none;">الشفرة غير صحيحة يا قائد!</p>
        </div>
    </div>
    <div id="mainApp">
        <nav class="navbar">
            <div class="logo">BenalalAI</div>
            <div id="statusDot" style="width:10px; height:10px; border-radius:50%; background:var(--error);"></div>
            <i class="fas fa-sign-out-alt" onclick="lockSystem()" style="cursor:pointer; color:#b0b3b8;"></i>
        </nav>
        <div class="container">
            <div class="terminal-box" id="term">
                > نظام بن علال v2.0 متصل...<br>
                > تم التحقق من الهوية السيادية.<br>
                > بانتظار الأوامر...
            </div>
            <div class="input-area">
                <input type="text" id="cmdInput" placeholder="أدخل أمراً للتنفيذ...">
                <i class="fas fa-paper-plane" style="color:var(--fb-blue); cursor:pointer;" onclick="runCommand()"></i>
            </div>
        </div>
    </div>
    <script>
        // ملاحظة: استبدل '1234' بكلمة المرور التي تريدها
        const MASTER_CODE = "2026"; 
        function verifyAccess() {
            const input = document.getElementById('passCode').value;
            if(input === MASTER_CODE) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                checkStatus();
            } else {
                document.getElementById('errMsg').style.display = 'block';
            }
        }
        function lockSystem() {
            location.reload(); // إعادة التحميل تقفل النظام فوراً
        }
        async function checkStatus() {
            try {
                const res = await fetch('http://localhost:5000/exec', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: 'echo 1'})
                });
                document.getElementById('statusDot').style.background = res.ok ? 'var(--neon)' : 'var(--error)';
            } catch {
                document.getElementById('statusDot').style.background = 'var(--error)';
            }
        }
        async function runCommand() {
            const cmd = document.getElementById('cmdInput').value;
            if(!cmd) return;
            const term = document.getElementById('term');
            term.innerHTML += `<br><span style="color:white;">$ ${cmd}</span>`;
            try {
                const res = await fetch('http://localhost:5000/exec', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: cmd})
                });
                const data = await res.json();
                term.innerHTML += `<br><pre style="color:cyan;">${data.output}</pre>`;
            } catch {
                term.innerHTML += `<br><span style="color:var(--error);">خطأ: فشل الاتصال.</span>`;
            }
            term.scrollTop = term.scrollHeight;
            document.getElementById('cmdInput').value = "";
        }
    </script>
</body>
</html>
