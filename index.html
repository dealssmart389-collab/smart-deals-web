<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - BenalalAI Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* الألوان الأصلية من لقطة الشاشة */
        :root {
            --fb-bg: #18191a;
            --fb-header: #242526;
            --fb-blue: #2d88ff;
            --fb-text: #e4e6eb;
            --fb-secondary-text: #b0b3b8;
        }
        body {
            background-color: var(--fb-bg);
            color: var(--fb-text);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        /* الجزء العلوي (Header) */
        .header {
            background: var(--fb-header);
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }
        .header-left { display: flex; gap: 8px; }
        .circle-btn {
            background: #3a3b3c;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }
        .logo-text {
            color: var(--fb-blue);
            font-size: 24px;
            font-weight: bold;
            letter-spacing: -1px;
        }
        /* شريط التبويبات (Tabs) */
        .tabs {
            background: var(--fb-header);
            display: flex;
            border-bottom: 1px solid #3e4042;
        }
        .tab {
            flex: 1;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--fb-secondary-text);
            font-size: 22px;
            position: relative;
        }
        .tab.active {
            color: var(--fb-blue);
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 3px;
            background: var(--fb-blue);
        }
        /* محتوى الماركت بليس */
        .content { padding: 12px; }
        .market-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .market-title { font-size: 20px; font-weight: bold; }
        .user-icon { color: var(--fb-blue); font-size: 20px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .card {
            background: #242526;
            border-radius: 8px;
            height: 250px;
            position: relative;
            overflow: hidden;
            border: 1px solid #3e4042;
        }
        .card-info {
            position: absolute;
            bottom: 0;
            right: 0;
            left: 0;
            padding: 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            text-align: right;
        }
        .price { font-weight: bold; font-size: 15px; margin-bottom: 2px; }
        .title {
            font-size: 12px;
            color: var(--fb-secondary-text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="circle-btn"><i class="fas fa-bars"></i></div>
            <div class="circle-btn"><i class="fas fa-search"></i></div>
        </div>
        <div class="logo-text">BenalalAI</div>
    </div>
    <div class="tabs">
        <div class="tab"><i class="fas fa-home"></i></div>
        <div class="tab"><i class="fas fa-tv"></i></div>
        <div class="tab active"><i class="fas fa-store"></i></div>
        <div class="tab"><i class="fas fa-bell"></i></div>
    </div>
    <div class="content">
        <div class="market-title-row">
            <div class="market-title">Marketplace</div>
            <div class="user-icon"><i class="fas fa-user"></i></div>
        </div>
        <div class="grid">
            <div class="card">
                <div class="card-info">
                    <div class="price">MAD 150</div>
                    <div class="title">تخفيضات Smart Deals ا...</div>
                </div>
            </div>
            <div class="card">
                <div class="card-info">
                    <div class="price">مجاناً</div>
                    <div class="title">أداة Timo AI المحدثة 6...</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
