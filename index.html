<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART WORLD SOURCE | طنجة 2100</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --cyan: #00f2ff; --dark: #000; }
        body { background: var(--dark); color: #fff; font-family: 'Orbitron', sans-serif; }
        
        /* مصفوفة الخلفية اللانهائية */
        .source-bg { position: fixed; width: 100%; height: 100%; z-index: -1; opacity: 0.15;
            background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 50px 50px; }

        /* حاويات الشركات الذكية */
        .accessory-card {
            background: rgba(20, 20, 20, 0.8); border: 1px solid #222; border-radius: 20px;
            padding: 15px; transition: 0.4s; position: relative; overflow: hidden; height: 100%;
        }
        .accessory-card:hover { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); transform: translateY(-10px); }

        .img-box { height: 150px; display: flex; align-items: center; justify-content: center; }
        .img-box img { max-height: 100%; filter: drop-shadow(0 0 10px var(--cyan)); }

        .price-tag { color: var(--gold); font-weight: 900; font-size: 1.2rem; }
        .brand-label { position: absolute; top: 10px; right: 10px; font-size: 10px; background: var(--cyan); color: #000; padding: 2px 8px; border-radius: 5px; }

        /* زر الحجز السريع */
        .btn-reserve { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            border-radius: 50px; font-size: 12px; font-weight: bold; transition: 0.3s;
        }
        .btn-reserve:hover { background: var(--gold); color: #000; }

        header { border-bottom: 2px solid var(--gold); padding: 20px 0; margin-bottom: 40px; }
    </style>
</head>
<body>
    <div class="source-bg"></div>

    <header class="text-center">
        <h1 style="color: var(--gold); font-weight: 900; text-shadow: 0 0 20px var(--gold);">SMART WORLD SOURCE</h1>
        <p class="small text-uppercase" style="letter-spacing: 5px;">ملتقى شركات التكنولوجيا العالمية - طنجة</p>
    </header>

    <div class="container pb-5">
        <h3 class="mb-4 text-info">📡 الهواتف الفائقة</h3>
        <div id="phone-grid" class="row g-4 mb-5"></div>

        <h3 class="mb-4 text-info">⌚ الإكسسوارات والقطع الذكية</h3>
        <div id="acc-grid" class="row g-4"></div>
    </div>

    <script>
        const phones = [
            { name: "Redmi Note 13 Pro+", price: 4200, img: "phone.jpg", brand: "XIAOMI" },
            { name: "Samsung S24 Ultra", price: 11500, img: "https://i.imgur.com/uRk0Zc7.png", brand: "SAMSUNG" },
            { name: "iPhone 15 Pro", price: 10500, img: "https://i.imgur.com/6XzW9vS.png", brand: "APPLE" }
        ];

        const accessories = [
            { name: "Smart Watch Ultra 2", price: 650, img: "https://i.imgur.com/Wp7u7T3.png", brand: "WATCH" },
            { name: "AirPods Pro Gen 3", price: 450, img: "https://i.imgur.com/vH9v5Z7.png", brand: "AUDIO" },
            { name: "Fast Charger 120W", price: 290, img: "https://i.imgur.com/9S5F3l6.png", brand: "POWER" },
            { name: "VR Neural Headset", price: 2500, img: "https://i.imgur.com/8QxXW5X.png", brand: "VISION" }
        ];

        function renderSource(data, gridId) {
            document.getElementById(gridId).innerHTML = data.map(i => `
                <div class="col-6 col-md-3">
                    <div class="accessory-card text-center">
                        <span class="brand-label">${i.brand}</span>
                        <div class="img-box mb-3">
                            <img src="${i.img}" class="img-fluid" onerror="this.src='https://via.placeholder.com/150/000/ffcc00?text=SMART+DEVICE'">
                        </div>
                        <h6 class="small fw-bold text-truncate">${i.name}</h6>
                        <p class="price-tag mb-3">${i.price} DH</p>
                        <a href="https://wa.me/212632997956" class="btn btn-reserve w-100">إحجز الآن</a>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => {
            renderSource(phones, 'phone-grid');
            renderSource(accessories, 'acc-grid');
        };
    </script>
</body>
</html>
