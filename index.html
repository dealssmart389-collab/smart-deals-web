<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART DEALS 2100 | TITAN CORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --neon-gold: #ffcc00; --cyber-blue: #00f2ff; --void: #020202; }
        body { background: var(--void); color: #fff; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }

        /* تأثير الغبار الكوني في الخلفية */
        .cosmos-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); opacity: 0.8; }

        /* الكارت الطافي 2100 */
        .future-card {
            background: rgba(10, 10, 10, 0.9); border: 2px solid #222; border-radius: 30px;
            padding: 25px; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; backdrop-filter: blur(20px);
        }
        .future-card:hover { border-color: var(--neon-gold); transform: scale(1.05) rotateX(5deg); box-shadow: 0 0 60px rgba(255, 204, 0, 0.2); }

        /* الصورة العصبية */
        .img-portal { background: radial-gradient(circle, rgba(255, 204, 0, 0.1) 0%, transparent 70%); border-radius: 50%; padding: 15px; }
        .product-img { filter: drop-shadow(0 0 20px var(--cyber-blue)); animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* زر الحجز السيادي */
        .btn-reserve {
            background: linear-gradient(90deg, #ffcc00, #ff8800); color: #000;
            font-weight: 900; border-radius: 50px; border: none; padding: 12px;
            text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px var(--neon-gold);
        }
        .btn-reserve:hover { transform: scale(1.1); box-shadow: 0 0 40px var(--neon-gold); }
    </style>
</head>
<body>
    <div class="cosmos-bg"></div>
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="fw-bold" style="color: var(--neon-gold); text-shadow: 0 0 30px var(--neon-gold);">SMART DEALS <span class="text-white">2100</span></h1>
            <div class="badge bg-info text-dark">NEURAL LINK v8.0 ACTIVE</div>
        </header>

        <div class="row g-5 justify-content-center">
            <div class="col-md-5">
                <div class="future-card text-center">
                    <div class="img-portal">
                        <img src="phone.jpg" class="product-img img-fluid" alt="Note 13 Pro+">
                    </div>
                    <div class="mt-4">
                        <div style="color: var(--neon-gold); letter-spacing: 5px;">⭐⭐⭐⭐⭐</div>
                        <h3 class="fw-bold mt-2">Redmi Note 13 Pro+</h3>
                        <p class="text-info small">200MP NEURAL CAMERA | 120W QUANTUM CHARGE</p>
                        <h2 class="fw-bold text-white mb-4">4200 DH</h2>
                        <a href="https://wa.me/212632997956" class="btn btn-reserve w-100">إحجز الآن</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
