<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benalal AI 2026 | لوحة التحكم السيادية</title>
    <style>
        body { background-color: #0a0a0b; color: #00ff41; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        .dashboard { border: 2px solid #00ff41; border-radius: 15px; padding: 25px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.2); }
        .header { text-align: center; border-bottom: 1px solid #00ff41; padding-bottom: 20px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-card { background: rgba(0, 255, 65, 0.05); border: 1px solid #00ff41; padding: 15px; border-radius: 10px; text-align: center; }
        .status-dot { display: inline-block; width: 10px; height: 10px; background: #00ff41; border-radius: 50%; margin-left: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        .map-placeholder { height: 200px; background: #111; border: 1px dashed #00ff41; display: flex; align-items: center; justify-content: center; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🛡️ بنلال للذكاء الاصطناعي 2026</h1>
            <p>المطور: منير بن علال 🇲🇦 (Benalal_mounir)</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>📡 رادار تيك توك</h3>
                <p><span class="status-dot"></span> متصل: @tvbenalal</p>
            </div>
            <div class="stat-card">
                <h3>📸 رادار إنستغرام</h3>
                <p><span class="status-dot"></span> مراقبة: hamza846478</p>
            </div>
            <div class="stat-card">
                <h3>⚖️ محرك NARSA</h3>
                <p>الحالة: سيادية نشطة</p>
            </div>
        </div>

        <div class="map-placeholder">
            <p>📍 خريطة العروض الذكية: المغرب (تحديث تلقائي...)</p>
        </div>

        <div style="margin-top: 20px; text-align: center;">
            <p>آخر مزامنة من Termux: <span id="sync-time"></span></p>
        </div>
    </div>
    <script>
        document.getElementById('sync-time').innerText = new Date().toLocaleString('ar-MA');
    </script>
</body>
</html>
