<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Deals AI | Global Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --gold: #eab308; --dark: #020617; }
        body { background: var(--dark); font-family: 'system-ui', sans-serif; overflow-x: hidden; }
        .ai-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.15); border: 1px solid rgba(234, 179, 8, 0.3); }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="text-white p-4">

    <div class="flex justify-between items-center mb-6 animate__animated animate__fadeInDown">
        <div>
            <h1 class="text-4xl font-black text-yellow-500 italic">SMART DEALS</h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                <p class="text-[10px] text-gray-400 font-mono">AI ENGINE ACTIVE v2.1</p>
            </div>
        </div>
        <div class="bg-yellow-500/10 p-3 rounded-2xl border border-yellow-500/20">
            <i class="fa-solid fa-microchip text-yellow-500"></i>
        </div>
    </div>

    <div id="ai-hub" class="glass-card rounded-[2rem] p-6 mb-8 ai-glow animate__animated animate__zoomIn">
        <div id="chat-box" class="h-32 overflow-y-auto mb-4 space-y-3 scrollbar-hide">
            <div class="text-yellow-500 font-bold text-sm">🌟 Gemini: "شريكي، أخبرني بميزانيتك وسأقوم بصنع عرض مستحيل لك الآن!"</div>
        </div>
        <div class="relative">
            <input type="text" id="user-ask" placeholder="مثلاً: أريد هاتف بـ 2000 درهم..." 
                class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-sm focus:border-yellow-500 transition-all outline-none">
            <button onclick="aiLogic()" class="absolute left-2 top-2 bg-yellow-500 text-black p-3 rounded-xl hover:scale-90 transition-transform">
                🚀
            </button>
        </div>
    </div>

    <div id="deals-wall" class="grid grid-cols-1 gap-4">
        </div>

    <script>
        const inventory = [
            { name: "Xiaomi Redmi Note 13", price: 2100, cat: "📱 هواتف", tag: "الأكثر طلباً" },
            { name: "Smart Watch Ultra", price: 450, cat: "⌚ ساعات", tag: "خصم حصري" },
            { name: "AirPods Pro 2", price: 300, cat: "🎧 صوتيات", tag: "هدية مجانية" }
        ];

        function renderDeals(filterPrice = 99999) {
            const wall = document.getElementById('deals-wall');
            wall.innerHTML = inventory.filter(d => d.price <= filterPrice).map(d => `
                <div class="glass-card p-5 rounded-[2rem] animate__animated animate__fadeInUp group">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-white/5 text-[10px] px-3 py-1 rounded-full border border-white/10">${d.cat}</span>
                        <span class="bg-yellow-500 text-black text-[9px] font-black px-2 py-1 rounded-md">${d.tag}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-1">${d.name}</h3>
                    <div class="flex justify-between items-end">
                        <p class="text-2xl font-black text-yellow-500">${d.price} <span class="text-xs">DH</span></p>
                        <button onclick="order('${d.name}')" class="bg-white text-black px-6 py-2 rounded-xl font-bold text-xs group-hover:bg-yellow-500 transition-colors">اطلب الآن</button>
                    </div>
                </div>
            `).join('');
        }

        function aiLogic() {
            const input = document.getElementById('user-ask').value;
            const chat = document.getElementById('chat-box');
            if(input.includes('2000')) {
                chat.innerHTML += `<div class="text-green-400 text-xs mt-2 italic">🔄 Gemini: "وجدت لك هاتف Xiaomi بخصم سري.. تم تحديث القائمة!"</div>`;
                renderDeals(2100);
            } else {
                chat.innerHTML += `<div class="text-blue-400 text-xs mt-2">🔄 Gemini: "جاري تحليل أفضل الصفقات لميزانيتك..."</div>`;
            }
        }

        function order(p) {
            window.open('https://wa.me/212XXXXXXXXX?text=' + encodeURIComponent('طلب ذكي لـ: ' + p));
        }

        window.onload = () => renderDeals();
    </script>
</body>
</html>
