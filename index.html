<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benalal OS | TIMO Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --neon: #00ff41; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: 'Cairo', sans-serif; margin: 0; padding-top: 60px; }
        
        /* Navbar */
        .navbar { background: var(--fb-card); height: 56px; border-bottom: 1px solid #3e4042; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--fb-blue); font-size: 28px; font-weight: bold; letter-spacing: -1px; }
        
        .container { max-width: 580px; margin: auto; padding: 10px; }

        /* Story Tray (Projects) */
        .story-tray { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .story-card { min-width: 100px; height: 170px; background: var(--fb-card); border-radius: 10px; position: relative; border: 1px solid #3e4042; flex-shrink: 0; overflow: hidden; }
        .story-card i { position: absolute; top: 10px; left: 10px; background: var(--fb-blue); border-radius: 50%; padding: 5px; font-size: 12px; }
        .story-card span { position: absolute; bottom: 8px; right: 8px; font-size: 11px; font-weight: bold; }

        /* Main Feed Card */
        .feed-card { background: var(--fb-card); border-radius: 8px; margin-bottom: 15px; padding: 12px; border: 1px solid #3e4042; }
        .card-header { display: flex; align-items: center; margin-bottom: 12px; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: var(--neon); margin-left: 10px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
        
        /* TIMO Console */
        #timo-console { background: #000; border-radius: 8px; padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; color: var(--neon); height: 180px; overflow-y: auto; border: 1px solid #3e4042; margin-bottom: 10px; }
        
        .input-area { background: #3a3b3c; border-radius: 20px; padding: 8px 15px; display: flex; align-items: center; gap: 10px; }
        .input-area input { background: none; border: none; color: white; flex: 1; outline: none; }
        
        .action-btn { flex: 1; text-align: center; padding: 8px; color: #b0b3b8; cursor: pointer; font-size: 14px; }
        .action-btn:hover { background: #3a3b3c; border-radius: 5px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">facebook</div>
        <div style="display: flex; gap: 15px; color: #b0b3b8;">
            <i class="fas fa-search"></i>
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <div class="container">
        <div class="story-tray">
            <div class="story-card" style="background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8)), url('https://via.placeholder.com/100x170/00ff41/000000?text=Driving+AI'); background-size: cover;">
                <i class="fas fa-car"></i>
                <span>Driving AI</span>
            </div>
            <div class="story-card" style="background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8)), url('https://via.placeholder.com/100x170/1877f2/ffffff?text=Smart+Deals'); background-size: cover;">
                <i class="fas fa-shopping-cart"></i>
                <span>Smart Deals</span>
            </div>
            <div class="story-card" style="background: #242526; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-plus" style="position: static; font-size: 20px;"></i>
                <span style="bottom: 20px; right: 25px;">إضافة مشروع</span>
            </div>
        </div>

        <div class="feed-card">
            <div class="card-header">
                <div class="profile-pic">T</div>
                <div>
                    <strong>تيمو (TIMO AI)</strong><br>
                    <small style="color: #b0b3b8;">نشط الآن • <i class="fas fa-globe-africa"></i></small>
                </div>
            </div>
            <div id="timo-console">
                > نظام بن علال السيادي v2.0 متصل...<br>
                > تم تحليل تقرير Bandit بنجاح.<br>
                > بانتظار أوامرك يا قائد...
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="بماذا تفكر؟">
                <i class="fas fa-paper-plane" style="color: var(--fb-blue); cursor: pointer;" onclick="sendToTimo()"></i>
            </div>
            <hr style="border: 0.5px solid #3e4042; margin: 12px 0;">
            <div style="display: flex;">
                <div class="action-btn"><i class="far fa-thumbs-up"></i> أعجبني</div>
                <div class="action-btn"><i class="far fa-comment"></i> تعليق</div>
                <div class="action-btn"><i class="fas fa-share"></i> مشاركة</div>
            </div>
        </div>
    </div>

    <script>
        const timoBrain = {
            "قانون": "المادة 1 و 2 من مدونة السير: تنظم حقوق الطريق وضرورة الرخصة.",
            "تحديث": "جاري مزامنة الملفات مع GitHub وتصحيح أخطاء SyntaxError...",
            "تحليل": "تم رصد 5178 تنبيه أمني منخفض الخطورة في مكتبة yt_dlp."
        };

        function sendToTimo() {
            const input = document.getElementById('user-input');
            const consoleBox = document.getElementById('timo-console');
            const val = input.value.trim();
            if(!val) return;

            consoleBox.innerHTML += `<div style="color: #fff; margin-top:5px;">👤 ${val}</div>`;
            let response = "🤖 جاري البحث في خوارزميات بن علال...";

            for(let key in timoBrain) {
                if(val.includes(key)) response = "🤖 " + timoBrain[key];
            }

            setTimeout(() => {
                consoleBox.innerHTML += `<div style="color: var(--neon); margin-bottom:10px;">${response}</div>`;
                consoleBox.scrollTop = consoleBox.scrollHeight;
                if(response.includes("جاري البحث")) {
                    window.open(`https://www.google.com/search?q=${encodeURIComponent(val)}`, '_blank');
                }
            }, 600);
            input.value = "";
        }
    </script>
</body>
</html>
