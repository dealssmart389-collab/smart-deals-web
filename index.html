<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Live Execution</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --neon: #00ff41; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 60px; }
        .navbar { background: var(--fb-card); height: 56px; display: flex; justify-content: center; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #3e4042; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .terminal-box { background: black; border-radius: 8px; padding: 15px; font-family: monospace; color: var(--neon); height: 300px; overflow-y: auto; border: 1px solid #333; margin-bottom: 10px; font-size: 12px; }
        .input-area { display: flex; gap: 10px; background: var(--fb-card); padding: 10px; border-radius: 25px; border: 1px solid #3e4042; }
        input { flex: 1; background: none; border: none; color: white; outline: none; }
        .send-btn { color: var(--fb-blue); cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div class="navbar"><strong style="color:var(--fb-blue)">BenalalAI Core</strong></div>
    <div class="container">
        <div class="terminal-box" id="term">
            > تم تفعيل بروتوكول التنفيذ الفعلي...<br>
            > الخادم المحلي متصل على المنفذ 5000.<br>
            > بانتظار أوامرك يا قائد منير...
        </div>
        <div class="input-area">
            <input type="text" id="cmdInput" placeholder="اكتب أمراً حقيقياً (مثلاً: ls أو pwd)...">
            <i class="fas fa-paper-plane send-btn" onclick="runRealCommand()"></i>
        </div>
    </div>
    <script>
        async function runRealCommand() {
            const cmd = document.getElementById('cmdInput').value;
            const term = document.getElementById('term');
            if(!cmd) return;
            term.innerHTML += `<br><span style="color:white;">$ ${cmd}</span>`;
            try {
                const response = await fetch('http://localhost:5000/exec', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: cmd})
                });
                const data = await response.json();
                if(data.status === "success") {
                    term.innerHTML += `<br><pre style="color:cyan;">${data.output}</pre>`;
                } else {
                    term.innerHTML += `<br><span style="color:red;">خطأ: ${data.output}</span>`;
                }
            } catch (e) {
                term.innerHTML += `<br><span style="color:red;">خطأ: الخادم غير مشغل! تأكد من تشغيل server.py في Termux.</span>`;
            }
            term.scrollTop = term.scrollHeight;
            document.getElementById('cmdInput').value = "";
        }
    </script>
</body>
</html>
