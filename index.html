<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SOVEREIGN SOURCE | نظام القوة الخالدة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --cyan: #00f2ff; --void: #000205; --neon-red: #ff0044; }
        body { background: var(--void); color: #fff; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }

        /* شريط التحكم السيادي (Neural Navbar) */
        .neural-nav {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--cyan); padding: 15px; position: fixed;
            top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-around;
        }
        .nav-icon { font-size: 1.5rem; color: var(--cyan); cursor: pointer; transition: 0.3s; }
        .nav-icon:hover { color: var(--gold); transform: scale(1.2) rotate(10deg); filter: drop-shadow(0 0 10px var(--gold)); }

        /* بوابة الدفع الكونية (Quantum Payment) */
        .payment-gate {
            background: linear-gradient(145deg, #050505, #111); border: 1px solid var(--gold);
            border-radius: 30px; padding: 25px; margin-top: 100px; position: relative; overflow: hidden;
        }
        .pay-btn { background: var(--neon-red); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; box-shadow: 0 0 30px var(--neon-red); transition: 0.4s; }
        .pay-btn:hover { background: #fff; color: #000; box-shadow: 0 0 60px var(--neon-red); transform: scale(1.1); }

        /* مصفوفة الإعدادات السريعة */
        .settings-panel { position: fixed; bottom: 20px; left: 20px; z-index: 1001; }
        .fab-main { width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 1.5rem; box-shadow: 0 0 20px var(--gold); cursor: pointer; }

        /* بطاقات المنتجات المحدثة */
        .tech-card { background: rgba(255,255,255,0.02); border: 1px solid #222; border-radius: 35px; padding: 20px; transition: 0.5s; }
        .tech-card:hover { border-color: var(--cyan); box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); }
    </style>
</head>
<body>

    <div class="neural-nav">
        <i class="fas fa-user-circle nav-icon" title="الملف الشخصي"></i>
        <i class="fas fa-sync-alt nav-icon" title="تحميل الجديد" onclick="location.reload()"></i>
        <i class="fas fa-shopping-cart nav-icon" title="السلة"></i>
        <i class="fas fa-cog nav-icon" title="الإعدادات"></i>
    </div>

    <div class="container" style="margin-top: 120px;">
        <div class="payment-gate text-center mb-5">
            <h2 style="color: var(--gold);">بوابة الدفع العصبية | NEURAL PAY</h2>
            <p class="small text-info">تشفير كوانتوم 256-بت مفعل</p>
            <div class="d-flex justify-content-center gap-3 my-4">
                <i class="fab fa-cc-visa fa-3x"></i>
                <i class="fab fa-cc-mastercard fa-3x"></i>
                <i class="fab fa-bitcoin fa-3x text-warning"></i>
            </div>
            <button class="pay-btn">إتمام الدفع الكوني</button>
        </div>

        <h3 class="mb-4 text-cyan">📱 مخزن الشركات العالمية</h3>
        <div class="row g-4" id="matrix"></div>
    </div>

    <div class="settings-panel">
        <div class="fab-main"><i class="fas fa-bolt"></i></div>
    </div>

    <script>
        const products = [
            { name: "Redmi Note 13 Pro+", price: "4200 DH", brand: "XIAOMI" },
            { name: "S24 Ultra AI", price: "11500 DH", brand: "SAMSUNG" },
            { name: "iPhone 15 Pro", price: "10500 DH", brand: "APPLE" }
        ];

        document.getElementById('matrix').innerHTML = products.map(p => `
            <div class="col-md-4">
                <div class="tech-card text-center">
                    <span class="badge bg-info mb-3">${p.brand}</span>
                    <h3 class="fw-bold text-white mb-3">${p.name}</h3>
                    <h2 class="fw-bold mb-4" style="color:var(--gold)">${p.price}</h2>
                    <button class="btn btn-outline-info w-100 rounded-pill mb-2">إضافة للسلة</button>
                    <button class="btn btn-warning w-100 rounded-pill fw-bold">شراء فوري</button>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
