<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMO AI SUPREME 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff41; --bg: #050505; --glass: rgba(0, 255, 65, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(0,255,65,0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0,255,65,0.1); }
        
        /* شاشة عرض الماتريكس (Output) */
        #output { background: #000; height: 250px; overflow-y: auto; padding: 15px; font-family: monospace; border-bottom: 2px solid var(--neon); border-radius: 10px; font-size: 13px; line-height: 1.6; }
        
        .ai-input-group { display: flex; gap: 10px; margin-top: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 50px; border: 1px solid var(--neon); }
        .ai-input { flex: 1; background: none; border: none; color: white; padding: 5px 15px; outline: none; }
        .btn-bolt { background: var(--neon); border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; color: black; font-size: 1.2rem; transition: 0.3s; }
        .btn-bolt:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--neon); }

        .price-tag { font-family: 'Orbitron'; color: var(--neon); font-size: 1.2em; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,255,65,0.1); border-radius: 15px; padding: 15px; text-align: center; }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    <div class="container">
        <header class="glass-panel d-flex justify-content-between align-items-center">
            <h2 style="font-family: 'Orbitron'; color: var(--neon); margin:0;">BENALAL AI <span style="font-size: 0.5em;">2026</span></h2>
            <small><i class="fas fa-microchip"></i> TIMO_CORE: ACTIVE</small>
        </header>

        <div class="glass-panel">
            <div id="output">
                <div style="color: var(--neon);">[SYSTEM]: تم دمج مصفوفة المعرفة الشاملة بنجاح...</div>
                <div style="color: var(--neon);">[SYSTEM]: محرك تيمو جاهز للبحث في NARSA و Smart Deals.</div>
            </div>
            <div class="ai-input-group">
                <input type="text" id="user-input" class="ai-input" placeholder="اسأل عن قانون، غرامة، أو صفقة...">
                <button onclick="executeTimoAction()" class="btn-bolt"><i class="fas fa-bolt"></i></button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="card">
                <i class="fas fa-car-side fa-2x" style="color: var(--neon);"></i>
                <h6>Driving AI</h6>
                <span class="price-tag">199 DH</span>
            </div>
            <div class="card">
                <i class="fas fa-shopping-bag fa-2x" style="color: #00a8ff;"></i>
                <h6>Smart Deals</h6>
                <span class="price-tag">299 DH</span>
            </div>
        </div>
    </div>

    <script>
        // 1. Matrix Background Logic
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const matrixChars = "01BENALALAI2026";
        const drops = Array(Math.floor(canvas.width/20)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(text, i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // 2. TIMO Omni-Logic (The code you provided)
        const timoOmniData = {
            "قانون": "المادة 1 و 2 من مدونة السير: تنظم حقوق استعمال الطريق وضرورة رخصة السياقة.",
            "غرامة": "تتراوح الغرامات بين 300 و 700 درهم حسب نوع المخالفة في قانون السير المغربي.",
            "عروض": "تيمو يبحث الآن في Smart Deals لجلب أفضل التخفيضات من Jumia و AliExpress.",
            "مساعدة": "أنا تيمو، محركك الذكي للبحث في القوانين، الأسواق، والتقنية."
        };

        function executeTimoAction() {
            const inputField = document.getElementById('user-input');
            const displayMatrix = document.getElementById('output');
            const query = inputField.value.trim();
            if (!query) return;

            displayMatrix.innerHTML += `<div style="color: white; margin-top: 10px;">👤 منير: ${query}</div>`;
            let response = "🤖 تيمو: جاري البحث في الروابط العالمية والمحلية...";

            Object.keys(timoOmniData).forEach(key => {
                if (query.includes(key)) { response = "🤖 تيمو: " + timoOmniData[key]; }
            });

            setTimeout(() => {
                displayMatrix.innerHTML += `<div style="color: #00ff41; margin-bottom: 10px; border-right: 2px solid var(--neon); padding-right: 8px;">${response}</div>`;
                displayMatrix.scrollTop = displayMatrix.scrollHeight;
                if (response.includes("جاري البحث")) {
                    window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
                }
            }, 500);
            inputField.value = "";
        }

        // تفعيل زر Enter
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeTimoAction();
        });
    </script>
</body>
</html>
