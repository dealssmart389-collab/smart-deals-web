<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Deals AI | التطور الفائق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .ai-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-[#030712] text-slate-200">

    <nav class="sticky top-0 z-50 glass p-4 flex justify-between items-center mx-4 mt-4 rounded-2xl">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-sm font-bold tracking-widest text-blue-400">GEMINI AI ACTIVE</span>
        </div>
        <div class="text-[10px] opacity-50">ID: 138834 | V 1.1.0</div>
    </nav>

    <main class="container mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-black mb-4 bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500 bg-clip-text text-transparent">شريكك الذكي في التسوق</h1>
            <p class="text-slate-400">تحدث مع Gemini لاكتشاف العروض التي تناسب ميزانيتك</p>
        </div>

        <div class="glass p-8 rounded-[2rem] max-w-2xl mx-auto ai-glow">
            <div id="ai-chat" class="h-64 overflow-y-auto mb-6 space-y-4 text-sm scrollbar-hide">
                <div class="bg-blue-600/20 p-3 rounded-2xl rounded-tr-none ml-12 italic">
                    مرحباً بك! أنا مساعدك الذكي. كيف يمكنني مساعدتك في العثور على أفضل عرض اليوم؟
                </div>
            </div>
            
            <div class="relative">
                <input type="text" id="user-input" placeholder="مثال: أريد هاتفاً بخصم 50%..." 
                class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500 transition-all text-right pr-12">
                <button onclick="askGemini()" class="absolute left-3 top-3 bg-blue-600 p-2 rounded-xl hover:scale-110 transition-transform">
                    ⚡
                </button>
            </div>
        </div>
    </main>

    <section class="grid grid-cols-2 gap-4 px-6 pb-24" id="products">
        </section>

    <script>
     // 🧠 Smart Deals AI Core V2.0 - Developed for Gemini Integration
window.onload = () => {
    const chat = document.getElementById('ai-chat');
    
    // 🎨 نظام بناء الفقاعات التفاعلية
    const createBubble = (text, type = 'ai') => {
        const div = document.createElement('div');
        div.className = type === 'ai' 
            ? "bg-gradient-to-br from-yellow-400 via-yellow-500 to-orange-500 p-4 rounded-2xl rounded-tr-none ml-8 shadow-2xl border border-yellow-300/50 animate-bounce-in"
            : "bg-gray-800 p-3 rounded-2xl rounded-tl-none mr-8 text-white self-end";
        
        div.innerHTML = `
            <div class="flex items-center gap-2 mb-1">
                <span class="text-[10px] font-black uppercase tracking-widest text-black/70">Smart Deals AI</span>
                <div class="h-1 w-1 bg-black rounded-full animate-pulse"></div>
            </div>
            <p class="font-bold text-sm text-black">${text}</p>
        `;
        return div;
    };

    // 🚀 تسلسل الترحيب الذكي
    setTimeout(() => {
        chat.appendChild(createBubble("🌟 أهلاً بك في عصر التسوق الذكي!"));
        chat.scrollTop = chat.scrollHeight;
        
        setTimeout(() => {
            chat.appendChild(createBubble("أنا مساعدك Gemini، قمت بتحليل أفضل العروض لك اليوم في المغرب 🇲🇦. هل تبحث عن هاتف جديد؟"));
            chat.scrollTop = chat.scrollHeight;
            
            // إضافة أزرار تفاعلية سريعة
            const actions = document.createElement('div');
            actions.className = "flex gap-2 ml-8 mt-2 overflow-x-auto pb-2";
            actions.innerHTML = `
                <button onclick="askAI('أريد عروض الهواتف')" class="bg-white/10 border border-white/20 px-3 py-1 rounded-full text-xs whitespace-nowrap">📱 عروض الهواتف</button>
                <button onclick="askAI('كيف أحصل على خصم؟')" class="bg-white/10 border border-white/20 px-3 py-1 rounded-full text-xs whitespace-nowrap">💰 طلب خصم</button>
            `;
            chat.appendChild(actions);
        }, 1500);
    }, 1000);
};

// ⚡ دالة التفاعل المباشر
function askAI(query) {
    console.log("Gemini Thinking about: " + query);
    // هنا يتم ربط الـ API الخاص بـ Gemini لاحقاً
}
    </script>
</body>
</html>
