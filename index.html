<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Logic Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* قاعدة الألوان الثابتة لفيسبوك المظلم */
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --fb-hover: #3a3b3c; --neon: #00ff41; }
        body { background: var(--fb-bg); color: var(--fb-text); font-family: Segoe UI, sans-serif; margin: 0; }
        /* تطبيق شرط "الهيكل الثابت" */
        .navbar { position: fixed; top: 0; width: 100%; height: 56px; background: var(--fb-card); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #3e4042; z-index: 1000; box-sizing: border-box; }
        .app-content { margin-top: 56px; padding: 8px; max-width: 500px; margin-left: auto; margin-right: auto; }
        /* مكون المنشورات (Component) */
        .fb-card { background: var(--fb-card); border-radius: 8px; padding: 12px; margin-bottom: 12px; border: 1px solid #3e4042; }
        .fb-input { background: var(--fb-hover); border-radius: 20px; padding: 8px 15px; border: none; color: white; flex: 1; outline: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-size: 24px; font-weight: bold; color: var(--fb-blue);">BenalalAI</div>
        <div id="connectionStatus" style="width: 12px; height: 12px; border-radius: 50%; background: gray; box-shadow: 0 0 5px gray;"></div>
    </nav>
    <div class="app-content">
        <div class="fb-card">
            <div style="display: flex; gap: 10px; align-items: center;">
                <div style="width: 40px; height: 40px; background: var(--neon); border-radius: 50%;"></div>
                <input type="text" class="fb-input" id="mainInput" placeholder="بماذا تفكر يا منير؟">
                <i class="fas fa-paper-plane" style="color: var(--fb-blue); cursor: pointer;" onclick="executeLogic()"></i>
            </div>
        </div>
        <div class="fb-card" style="background: black;">
            <div id="logicOutput" style="font-family: monospace; color: var(--neon); font-size: 13px; min-height: 200px;">
                > نظام بن علال يتبع الآن قواعد React Logic...<br>
                > بانتظار معالجة البيانات...
            </div>
        </div>
    </div>
    <script>
        // تطبيق قاعدة "الحالة المركزية" (State Management)
        const State = {
            isConnected: false,
            lastCommand: "",
            updateStatus(status) {
                this.isConnected = status;
                const dot = document.getElementById('connectionStatus');
                dot.style.background = status ? 'var(--neon)' : 'red';
                dot.style.boxShadow = status ? '0 0 10px var(--neon)' : '0 0 10px red';
            }
        };
        async function executeLogic() {
            const val = document.getElementById('mainInput').value;
            if(!val) return;
            // تطبيق شرط "الاستجابة الفورية" (Optimistic UI)
            const output = document.getElementById('logicOutput');
            output.innerHTML += `<br><span style="color:white;">$ Processing: ${val}...</span>`;
            // محاكاة الاتصال الذكي (GraphQL Style)
            try {
                const res = await fetch('http://localhost:5000/exec', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: val})
                });
                const data = await res.json();
                output.innerHTML += `<br>> Result: ${data.output}`;
                State.updateStatus(true);
            } catch {
                State.updateStatus(false);
                output.innerHTML += `<br><span style="color:red;">> Error: Server unreachable!</span>`;
            }
            output.scrollTop = output.scrollHeight;
            document.getElementById('mainInput').value = "";
        }
        // فحص الحالة عند البدء
        setInterval(() => State.updateStatus(State.isConnected), 3000);
    </script>
</body>
</html>
