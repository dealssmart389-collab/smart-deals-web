<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Core Audit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --neon: #00ff41; }
        body { background: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 60px; }
        /* الهيدر الأصلي */
        .navbar { background: var(--fb-card); height: 56px; border-bottom: 1px solid #3e4042; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--fb-blue); font-size: 24px; font-weight: bold; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        /* شاشة تيمو الأصلية */
        .post-card { background: var(--fb-card); border-radius: 8px; padding: 12px; border: 1px solid #3e4042; margin-top: 10px; }
        .terminal-box { background: black; border-radius: 8px; padding: 15px; font-family: monospace; color: var(--neon); height: 300px; overflow-y: auto; border: 1px solid #333; font-size: 13px; line-height: 1.5; }
        /* أزرار التحكم في السيادة */
        .scan-btn { width: 100%; background: var(--fb-blue); color: white; border: none; padding: 10px; border-radius: 6px; margin-top: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .scan-btn:active { opacity: 0.8; }
    </style>
</head>
<body>
    <nav class="navbar">
        <i class="fas fa-bars"></i>
        <div class="logo">BenalalAI</div>
        <div id="statusIndicator" style="width:10px; height:10px; border-radius:50%; background:gray;"></div>
    </nav>
    <div class="container">
        <div class="post-card">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                <div style="width:40px; height:40px; background:var(--neon); border-radius:50%; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold;">T</div>
                <div><strong>تيمو (TIMO AI)</strong><br><small>فحص النواة نشط</small></div>
            </div>
            <div class="terminal-box" id="term">
                > نظام بن علال بانتظار أمر الفحص...<br>
                > اضغط على الزر أدناه لجرد الملفات الحقيقية.
            </div>
            <button class="scan-btn" onclick="runScan()">
                <i class="fas fa-microchip"></i> إجراء فحص شامل للملفات
            </button>
        </div>
    </div>
    <script>
        async function runScan() {
            const term = document.getElementById('term');
            term.innerHTML = "> جاري بدء الفحص الشامل...<br>> جرد ملفات المستودع السيادي:";
            try {
                const res = await fetch('http://localhost:5000/exec', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: 'ls -R'})
                });
                const data = await res.json();
                if(data.status === "success") {
                    term.innerHTML += `<br><pre style="color:cyan;">${data.output}</pre>`;
                    term.innerHTML += "<br>> تم الفحص بنجاح. كل الأساسات في مكانها.";
                    document.getElementById('statusIndicator').style.background = 'var(--neon)';
                } else {
                    term.innerHTML += "<br><span style='color:red;'>! فشل الفحص: الخادم غير مستجيب.</span>";
                }
            } catch (e) {
                term.innerHTML += "<br><span style='color:red;'>! خطأ: تأكد من تشغيل server.py في Termux.</span>";
            }
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
