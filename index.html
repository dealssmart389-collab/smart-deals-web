<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benalal AI - Social Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .fb-header { background-color: #1877f2; color: white; padding: 12px; font-weight: bold; box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .card-post { border-radius: 8px; border: none; box-shadow: 0 1px 2px rgba(0,0,0,.1); margin-bottom: 15px; background: white; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; background: #00a400; }
    </style>
</head>
<body>
    <div class="fb-header sticky-top text-center">
        <span>BENALAL AI CORE v1.0</span>
    </div>
    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-post p-3">
                    <div class="d-flex align-items-center">
                        <div class="profile-img"></div>
                        <div class="ms-3 text-end">
                            <div style="font-weight: bold;">تيمو (TIMO)</div>
                            <small class="text-muted">نشط الآن • متصل 🟢</small>
                        </div>
                    </div>
                    <div class="mt-3 text-end">أهلاً بك يا سيد منير! نظام "بنلال للذكاء الاصطناعي" يعمل بكامل طاقته الآن.</div>
                </div>

                <div class="card card-post text-end">
                    <div class="p-3 pb-0">
                        <span class="badge bg-primary mb-2">📡 رادار الصفقات</span>
                    </div>
                    <div class="card-body pt-1">
                        <p>تم رصد حركة نشطة في الرابط العالمي... جاري تحليل العروض لـ Smart Deals.</p>
                        <hr>
                        <div class="d-flex justify-content-around">
                            <button class="btn btn-light btn-sm w-100">👍 أعجبني</button>
                            <button class="btn btn-light btn-sm w-100">💬 تعليق</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
