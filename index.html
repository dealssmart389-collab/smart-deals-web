<div id="output"></div>
<input type="text" id="user-input" placeholder="اسأل تيمو...">
<button onclick="humanSearch()">إرسال</button>

<script>
function humanSearch() {
    const input = document.getElementById('user-input');
    const output = document.getElementById('output');
    const query = input.value.toLowerCase();
    
    if (!query) return;
    
    // منطق البحث المحسن
    let found = false;
    for (let key in drivingLaws) {
        if (query.includes(key)) {
            output.innerHTML += `<p>🤖 تيمو: ${drivingLaws[key]}</p>`;
            found = true;
            break;
        }
    }
    
    if (!found) {
        window.open(`https://www.google.com/search?q=${query}`, '_blank');
    }
    input.value = "";
}
</script>
