<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART SOURCE 2100</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-gold: #ffcc00; --dark-void: #020205; }
        body { background: var(--dark-void); color: #fff; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }

        /* تأثير الزجاج المستقبلي */
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 25px; transition: 0.5s; }
        .glass-panel:hover { border-color: var(--neon-cyan); box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); }

        /* الأيقونات العلوية - التفاعل الذكي */
        .nav-link-cyber { color: var(--neon-cyan); font-size: 1.8rem; cursor: pointer; transition: 0.3s; }
        .nav-link-cyber:hover { color: var(--neon-gold); transform: scale(1.3) rotate(10deg); }

        /* زر النبض (قلب النظام) */
        .core-pulse { width: 80px; height: 80px; background: var(--neon-gold); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: #000; font-size: 2rem;
            position: fixed; bottom: 30px; left: 30px; z-index: 1000; box-shadow: 0 0 50px var(--neon-gold);
            animation: heart-beat 1.5s infinite; cursor: pointer; }
        @keyframes heart-beat { 0% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 80px var(--neon-gold); } 100% { transform: scale(1); } }

        /* تصحيح عرض المنتجات وسد الثغرات */
        .product-badge { background: linear-gradient(90deg, #ff0044, #ffcc00); padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="d-flex justify-content-around p-3 fixed-top" style="background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--neon-cyan);">
        <i class="fas fa-user-shield nav-link-cyber" onclick="triggerAction('الملف الشخصي السيادي')"></i>
        <i class="fas fa-shopping-cart nav-link-cyber" onclick="triggerAction('سلة المشتريات الذكية')"></i>
        <i class="fas fa-sync-alt nav-link-cyber" onclick="location.reload()"></i>
        <i class="fas fa-cog nav-link-cyber" onclick="triggerAction('إعدادات النواة')"></i>
    </div>

    <div class="container text-center" style="margin-top: 120px;">
        <div class="glass-panel mb-5">
            <h1 class="text-gold" style="color:var(--neon-gold)">NEURAL PAY | بوابة الدفع 2100</h1>
            <p class="text-muted">تشفير كوانتوم 256-بت مفعل</p>
            <div class="d-flex justify-content-center gap-3 my-4">
                <i class="fab fa-bitcoin fa-3x"></i>
                <i class="fab fa-cc-visa fa-3x"></i>
            </div>
            <button class="btn btn-danger btn-lg rounded-pill px-5 fw-bold" onclick="startPayment()">إتمام الدفع الكوني</button>
        </div>

        <h3 class="text-info mb-4 text-end">مخزن الشركات العالمية</h3>
        <div class="row g-4" id="inventory-grid"></div>
    </div>

    <div class="core-pulse" onclick="checkSystemStatus()"><i class="fas fa-bolt"></i></div>

    <script>
        function triggerAction(name) {
            alert("نظام 2100: جاري فتح " + name + " عبر الاتصال العصبي...");
        }

        function startPayment() {
            const val = prompt("أدخل قيمة الشحن (DH):");
            if(val) alert("تمت المعالجة! الرصيد الجديد قيد التحديث في سحابة طنجة.");
        }

        function checkSystemStatus() {
            alert("تحليل النبض: الحالة مستقرة | القوة: خالدة | الزمن: 2100 م");
        }

        const data = [
            { id: 1, name: "Redmi Note 13 Pro+", price: "4200 DH", tech: "200MP | HyperOS" },
            { id: 2, name: "S24 Ultra Quantum", price: "11500 DH", tech: "AI Core | Titan Body" }
        ];

        document.getElementById('inventory-grid').innerHTML = data.map(p => `
            <div class="col-md-6">
                <div class="glass-panel">
                    <span class="product-badge text-white mb-2 d-inline-block">حصري - طنجة</span>
                    <h4 class="text-white">${p.name}</h4>
                    <p class="text-cyan small">${p.tech}</p>
                    <h2 class="text-warning">${p.price}</h2>
                    <button class="btn btn-outline-info w-100 rounded-pill mt-3" onclick="alert('تم الحجز بنجاح')">حجز فوري</button>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
