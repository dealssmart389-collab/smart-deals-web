<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Media Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --neon: #00ff41; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 60px; }
        .navbar { background: var(--fb-card); height: 56px; border-bottom: 1px solid #3e4042; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--fb-blue); font-family: sans-serif; font-size: 26px; font-weight: bold; letter-spacing: -1px; }
        .container { max-width: 580px; margin: auto; padding: 10px; }
        .feed-card { background: var(--fb-card); border-radius: 8px; margin-bottom: 15px; padding: 12px; border: 1px solid #3e4042; }
        /* Media Upload Styling */
        .upload-options { display: flex; border-top: 1px solid #3e4042; margin-top: 10px; padding-top: 10px; }
        .option { flex: 1; text-align: center; color: #b0b3b8; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .option i.fa-video { color: #f02849; }
        .option i.fa-images { color: #45bd62; }
        #preview-container { margin-top: 10px; display: none; }
        #preview-container img { width: 100%; border-radius: 8px; border: 1px solid var(--neon); }
        #timo-console { background: #000; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 13px; color: var(--neon); height: 120px; overflow-y: auto; margin: 10px 0; border: 1px solid #3e4042; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">BenalalAI</div>
        <div style="color: #b0b3b8;"><i class="fas fa-bars"></i></div>
    </nav>
    <div class="container">
        <div class="feed-card">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                <div style="width:40px; height:40px; background:var(--neon); border-radius:50%; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold;">M</div>
                <input type="text" placeholder="بماذا تفكر يا منير؟" style="background:#3a3b3c; border:none; border-radius:20px; padding:10px 15px; color:white; flex:1; outline:none;">
            </div>
            <div id="preview-container">
                <img id="image-preview" src="#" alt="Preview">
                <p id="file-name" style="font-size: 10px; color: var(--neon);"></p>
            </div>
            <div class="upload-options">
                <div class="option" onclick="document.getElementById('video-upload').click()">
                    <i class="fas fa-video"></i> فيديو مباشر
                    <input type="file" id="video-upload" accept="video/*" style="display:none;" onchange="handleFile(this, 'video')">
                </div>
                <div class="option" onclick="document.getElementById('image-upload').click()">
                    <i class="fas fa-images"></i> صور/فيديو من الهاتف
                    <input type="file" id="image-upload" accept="image/*,video/*" style="display:none;" onchange="handleFile(this, 'media')">
                </div>
            </div>
        </div>
        <div class="feed-card">
            <strong><i class="fas fa-robot"></i> تيمو (BenalalAI OS)</strong>
            <div id="timo-console">
                > نظام الرفع جاهز.. بانتظار الملفات.<br>
                > سيتم مزامنة أي صورة ترفعها مع مستودع GitHub تلقائياً.
            </div>
        </div>
    </div>
    <script>
        function handleFile(input, type) {
            const consoleBox = document.getElementById('timo-console');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                const file = input.files[0];
                reader.onload = function(e) {
                    document.getElementById('preview-container').style.display = 'block';
                    document.getElementById('image-preview').src = e.target.result;
                    document.getElementById('file-name').innerText = "تم اختيار: " + file.name;
                    consoleBox.innerHTML += "<br>> <span style='color:white;'>[UPLOAD]:</span> جاري تحضير " + file.name + "...";
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
