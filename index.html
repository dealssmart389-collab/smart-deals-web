<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMO AI SUPREME | UNIFIED NEURAL ENGINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00ff41; --bg: #010101; --panel: #0d0d0d; --alert: #ff3b30; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', system-ui; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* شريط الحالة السيادي */
        .status-header { display: flex; justify-content: space-between; padding: 10px; border: 1px solid #222; border-radius: 12px; font-size: 10px; font-family: monospace; color: var(--neon); margin-bottom: 15px; background: rgba(255,255,255,0.03); }

        /* وحدة الرؤية العصبونية المزدوجة */
        .vision-matrix { position: relative; width: 100%; height: 230px; background: #000; border: 1px solid var(--neon); border-radius: 20px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); }
        #video-feed { width: 100%; height: 100%; object-fit: cover; filter: brightness(1.1) contrast(1.1); }
        .scan-bar { position: absolute; width: 100%; height: 2px; background: var(--neon); top: 0; animation: scanMove 4s infinite linear; box-shadow: 0 0 15px var(--neon); z-index: 2; }
        .ocr-target { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 110px; border: 2px dashed rgba(0, 255, 65, 0.4); border-radius: 15px; pointer-events: none; }
        .trans-overlay { position: absolute; bottom: 15px; left: 15px; right: 15px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--neon); padding: 10px; border-radius: 10px; font-size: 11px; backdrop-filter: blur(5px); display: none; }

        /* شبكة البيانات (Matrix Grid) */
        .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .data-card { background: var(--panel); border: 1px solid #1a1a1a; padding: 12px; border-radius: 15px; text-align: center; transition: 0.3s; }
        .data-card:active { transform: scale(0.95); border-color: var(--neon); }
        .data-card i { color: var(--neon); font-size: 1.4rem; margin-bottom: 6px; }
        .val { display: block; font-size: 14px; font-weight: bold; color: gold; }

        /* مصفوفة الحوار العصبوني */
        .neural-chat { background: #050505; border: 1px solid #333; border-radius: 20px; height: 350px; display: flex; flex-direction: column; overflow: hidden; }
        #log-stream { flex: 1; padding: 15px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.6; }
        .timo-msg { color: var(--neon); border-right: 3px solid var(--neon); padding-right: 10px; margin-bottom: 12px; animation: fadeIn 0.3s; }
        .user-msg { color: #fff; margin-bottom: 12px; opacity: 0.8; text-align: left; }

        /* منطقة التحكم الذكي */
        .control-hub { display: flex; padding: 12px; gap: 10px; background: #000; border-top: 1px solid #222; }
        #input-cmd { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; outline: none; }
        .btn-action { border: none; padding: 0 18px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        .btn-mic { background: #222; color: #fff; }
        .btn-send { background: var(--neon); color: #000; font-weight: bold; }
        .listening-active { background: var(--alert) !important; animation: pulse 1s infinite; }

        @keyframes scanMove { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="status-header">
    <span><i class="fas fa-microchip"></i> TIMO_CORE: ACTIVE</span>
    <span><i class="fas fa-bolt"></i> BATT: 92%</span>
    <span><i class="fas fa-shield-alt"></i> SOVEREIGNTY: ON</span>
</div>

<div class="vision-matrix">
    <div class="scan-bar"></div>
    <div class="ocr-target"></div>
    <video id="video-feed" autoplay playsinline></video>
    <div class="trans-overlay" id="trans-box">
        <i class="fas fa-language"></i> <span id="trans-text">جاري تحليل النص...</span>
    </div>
</div>

<div class="data-grid">
    <div class="data-card">
        <i class="fas fa-car-side"></i>
        <span style="font-size: 9px; opacity: 0.6;">DrivingAI</span>
        <span class="val">المادة 1 & 2</span>
    </div>
    <div class="data-card">
        <i class="fas fa-shopping-bag"></i>
        <span style="font-size: 9px; opacity: 0.6;">Smart Deals</span>
        <span class="val">299 DH</span>
    </div>
</div>

<div class="neural-chat">
    <div id="log-stream">
        <div class="timo-msg">> تم دمج وتصحيح كافة الأنظمة بنجاح...</div>
        <div class="timo-msg">> محرك الترجمة والرد الصوتي والماسح البصري في وضع الاستعداد.</div>
    </div>
    <div class="control-hub">
        <button id="mic-btn" class="btn-action btn-mic" onclick="toggleSpeech()"><i class="fas fa-microphone"></i></button>
        <input type="text" id="input-cmd" placeholder="تحدث، ترجم فرنسي، أو اسأل تيمو...">
        <button class="btn-action btn-send" onclick="handleLogic()"><i class="fas fa-bolt"></i></button>
    </div>
</div>

<script>
    // 1. تشغيل الكاميرا (الخلفية للأجهزة المحمولة)
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(s => document.getElementById('video-feed').srcObject = s)
        .catch(() => {
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => document.getElementById('video-feed').srcObject = s);
        });

    // 2. نظام الرد الصوتي (Output)
    function speak(text) {
        window.speechSynthesis.cancel(); // إيقاف أي صوت سابق
        const msg = new SpeechSynthesisUtterance(text.replace(/>/g, ''));
        msg.lang = 'ar-SA';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    // 3. نظام التعرف على الكلام (Input)
    const micBtn = document.getElementById('mic-btn');
    const inputField = document.getElementById('input-cmd');
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    
    recognition.lang = 'ar-MA'; // اللهجة المغربية
    recognition.continuous = false;

    function toggleSpeech() {
        micBtn.classList.add('listening-active');
        recognition.start();
    }

    recognition.onresult = (e) => {
        inputField.value = e.results[0][0].transcript;
        micBtn.classList.remove('listening-active');
        handleLogic();
    };

    recognition.onerror = () => micBtn.classList.remove('listening-active');

    // 4. المحرك المنطقي العصبوني
    function handleLogic() {
        const query = inputField.value.trim();
        if (!query) return;

        const log = document.getElementById('log-stream');
        const transBox = document.getElementById('trans-box');
        const transText = document.getElementById('trans-text');

        log.innerHTML += `<div class="user-msg">👤 أنت: ${query}</div>`;
        inputField.value = "";

        let response = "";
        
        // ذكاء اصطناعي محاكي للترجمة والبيانات
        if (query.toLowerCase().includes("code de la route") || query.includes("قانون السير")) {
            response = "> تم تحليل النص: 'قانون السير'. المادة 1 تنص على قواعد الأسبقية، والمادة 2 تتعلق بالغرامات التصالحية في DrivingAI.";
            transBox.style.display = "block";
            transText.innerText = "ترجمة: مدونة السير المغربية";
        } else {
            response = `> تم تحليل الاستعلام عصبونياً. النتيجة: معالجة "${query}" عبر مصفوفة السيادة ناجحة. الربط مع Smart Deals مستقر.`;
            transBox.style.display = "none";
        }

        const resDiv = document.createElement('div');
        resDiv.className = 'timo-msg';
        resDiv.innerHTML = '🤖 تيمو: ';
        log.appendChild(resDiv);

        let i = 0;
        function type() {
            if (i < response.length) {
                resDiv.innerHTML += response.charAt(i);
                i++;
                setTimeout(type, 15);
                log.scrollTop = log.scrollHeight;
            } else {
                speak(response);
            }
        }
        type();
    }
</script>

</body>
</html>
