<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERO-G DEALS | TANGIER 2100</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --neon-gold: #ffcc00; --deep-space: #000205; --plasma-cyan: #00f2ff; }
        body { background: var(--deep-space); color: #fff; overflow: hidden; font-family: 'Orbitron', sans-serif; height: 100vh; }

        /* تأثير الجاذبية المنعدمة في الخلفية */
        .stars-container { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* الكارت المتحدي للجاذبية */
        .gravity-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 204, 0, 0.2);
            border-radius: 40px; padding: 40px; backdrop-filter: blur(30px);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
            animation: floating-entity 6s infinite ease-in-out;
            transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .gravity-card:hover { transform: scale(1.02) rotateX(10deg); border-color: var(--neon-gold); box-shadow: 0 0 100px rgba(255, 204, 0, 0.15); }

        @keyframes floating-entity {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(1deg); }
            66% { transform: translateY(-15px) rotate(-1deg); }
        }

        /* صورة الهاتف السيادية */
        .product-portal { position: relative; perspective: 1000px; }
        .product-img { 
            filter: drop-shadow(0 0 30px var(--plasma-cyan)); 
            max-height: 350px; 
            animation: pulse-glow 4s infinite;
        }
        @keyframes pulse-glow { 0%, 100% { filter: drop-shadow(0 0 20px var(--plasma-cyan)); } 50% { filter: drop-shadow(0 0 50px var(--neon-gold)); } }

        /* زر الحجز الكوني */
        .btn-gravity {
            background: transparent; border: 2px solid var(--neon-gold); color: var(--neon-gold);
            font-weight: 900; border-radius: 100px; padding: 20px; font-size: 1.2rem;
            text-transform: uppercase; letter-spacing: 4px; transition: 0.5s;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
        }
        .btn-gravity:hover { background: var(--neon-gold); color: #000; box-shadow: 0 0 60px var(--neon-gold); transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="stars-container" id="stars"></div>

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="gravity-card text-center col-lg-6">
            <div class="badge bg-warning text-dark mb-4 px-3 py-2" style="border-radius: 50px; letter-spacing: 2px;">ANTI-GRAVITY CORE v10.0</div>
            
            <div class="product-portal mb-5">
                <img src="phone.jpg" class="product-img img-fluid" alt="Redmi Note 13 Pro+">
            </div>

            <h1 class="fw-bold mb-2" style="color: var(--neon-gold); font-size: 2.5rem;">REDMI NOTE 13 PRO+</h1>
            <p class="text-info mb-4" style="letter-spacing: 3px;">200MP | 120W | HYPER-OS</p>
            
            <div class="d-flex justify-content-center gap-4 mb-5">
                <h2 class="fw-bold">4200 DH</h2>
                <div style="color: var(--neon-gold); font-size: 1.5rem;">⭐⭐⭐⭐⭐</div>
            </div>

            <a href="https://wa.me/212632997956?text=أريد حجز هاتف المستقبل" class="btn btn-gravity w-100">إحجز الآن</a>
        </div>
    </div>

    <script>
        // توليد النجوم في الخلفية
        const stars = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            stars.appendChild(star);
        }
    </script>
</body>
</html>
