<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Execution Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --neon: #00ff41; }
        body { background: var(--fb-bg); color: var(--fb-text); font-family: monospace; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3e4042; padding-bottom: 10px; margin-bottom: 20px; }
        .status-pill { padding: 4px 12px; border-radius: 15px; font-size: 12px; border: 1px solid #3e4042; }
        /* شاشة التنفيذ المركزية */
        .terminal { background: #000; border-radius: 5px; padding: 15px; height: 350px; overflow-y: auto; border: 1px solid #333; color: var(--neon); font-size: 14px; }
        .input-group { display: flex; margin-top: 15px; gap: 10px; }
        input { flex: 1; background: var(--fb-card); border: 1px solid #3e4042; color: white; padding: 12px; border-radius: 5px; outline: none; }
        button { background: var(--fb-blue); color: white; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .critical-info { margin-top: 20px; font-size: 12px; color: #b0b3b8; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <span style="color: var(--fb-blue); font-weight: bold;">BenalalAI v2.0</span>
        <div class="status-pill" id="st">Checking...</div>
    </div>
    <div class="terminal" id="out">
        > النظام جاهز للتنفيذ الفعلي.<br>
        > بانتظار أوامر القائد منير...
    </div>
    <div class="input-group">
        <input type="text" id="in" placeholder="أدخل أمر Termux..." onkeypress="if(event.key==='Enter') run()">
        <button onclick="run()">تنفيذ</button>
    </div>
    <div class="critical-info">
        <span>الموقع: Morocco</span> | <span>المستودع: Benalal_mounir</span> | <span>التوقيت: 2026-03-22</span>
    </div>
    <script>
        async function check() {
            const st = document.getElementById('st');
            try {
                await fetch('http://localhost:5000/exec', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({command:'echo 1'})});
                st.innerText = "ONLINE"; st.style.color = "var(--neon)";
            } catch {
                st.innerText = "OFFLINE"; st.style.color = "red";
            }
        }
        async function run() {
            const i = document.getElementById('in');
            const o = document.getElementById('out');
            if(!i.value) return;
            o.innerHTML += `<br><span style="color:white;">$ ${i.value}</span>`;
            try {
                const r = await fetch('http://localhost:5000/exec', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: i.value})
                });
                const d = await r.json();
                o.innerHTML += `<br>${d.output}`;
            } catch {
                o.innerHTML += "<br>!! Error connecting to Server !!";
            }
            o.scrollTop = o.scrollHeight;
            i.value = "";
            check();
        }
        setInterval(check, 5000); check();
    </script>
</body>
</html>
