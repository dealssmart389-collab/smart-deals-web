<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Deals - الدفع الآمن</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #00ff41; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); text-align: center; width: 350px; }
        .payment-methods { margin-top: 20px; }
        .btn-paypal { background: #0070ba; color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-visa { background: #1a1f71; color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
        .status { font-size: 0.8em; margin-top: 15px; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h2>NEURAL PAY 2100</h2>
        <p>مشروع Smart Deals</p>
        <div class="payment-methods">
            <button class="btn-paypal" onclick="payWithPayPal()">PayPal</button>
            <button class="btn-visa" onclick="payWithVisa()">Visa / MasterCard</button>
        </div>
        <div class="status" id="log">[+] النظام مؤمن ببروتوكول Bandit</div>
    </div>

    <script>
        function sendNotification(method) {
            // إرسال إشارة لـ Termux (Gatekeeper) ليصدر تنبيهاً على هاتفك
            fetch('http://localhost:5000/notify_payment_access')
            .then(() => {
                document.getElementById('log').innerText = "[✓] تم إرسال تنبيه الدفع لـ Termux";
            });
        }

        function payWithPayPal() {
            alert("جاري الاتصال بـ PayPal...");
            sendNotification('PayPal');
        }

        function payWithVisa() {
            alert("جاري فتح بوابة Visa الآمنة...");
            sendNotification('Visa');
        }
    </script>
</body>
</html>
