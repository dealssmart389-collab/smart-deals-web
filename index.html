<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART DEALS AI | THE GIANT AWAKENS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --neon-gold: #ffcc00; --cyber-blue: #00f2ff; --dark-void: #050505; }
        body { background: var(--dark-void); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* تأثير الشبكة الكونية المتحركة */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255, 204, 0, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 204, 0, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1; animation: grid-move 20s linear infinite;
        }
        @keyframes grid-move { from { transform: translateY(0); } to { transform: translateY(30px); } }

        /* الهيدر الأسطوري */
        .scifi-header {
            border-bottom: 2px solid var(--neon-gold); padding: 20px;
            box-shadow: 0 0 25px var(--neon-gold); background: rgba(0,0,0,0.9);
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
        }

        /* واجهة الاتصال العصبية Gemini */
        .gemini-core {
            border: 1px solid var(--cyber-blue); background: rgba(0, 242, 255, 0.05);
            border-radius: 0 30px 0 30px; padding: 25px; margin: 20px 0;
            backdrop-filter: blur(10px); position: relative;
        }
        .gemini-core::after { content: "CORE_v6.1_ACTIVE"; position: absolute; top: 5px; right: 15px; font-size: 8px; color: var(--cyber-blue); }

        /* نبض الحياة في المنتجات */
        .scifi-card {
            background: rgba(15, 15, 15, 0.95); border: 1px solid #333; transition: 0.4s;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }
        .scifi-card:hover { border-color: var(--neon-gold); box-shadow: 0 0 30px var(--neon-gold); transform: translateY(-10px); }
        
        .product-img {
            filter: drop-shadow(0 0 8px var(--cyber-blue));
            animation: pulse 2.5s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }

        .btn-execute {
            background: var(--neon-gold); color: #000; font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); border: none;
        }
    </style>
</head>
<body>

    <div class="scifi-header text-center">
        <h1 class="fw-bold" style="color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold);">SMART DEALS AI</h1>
        <p class="small text-uppercase" style="letter-spacing: 3px;">The World's Most Powerful Commercial Engine</p>
    </div>

    <div class="container">
        <div class="gemini-core shadow-lg">
            <h4 class="text-info">📡 واجهة Gemini العصبية</h4>
            <p id="aiResponse" class="small">"شريكي، أخبرني بميزانيتك وسأقوم بصنع عرض مستحيل لك الآن!"</p>
            <div class="input-group mt-3">
                <input type="text" id="aiInput" class="form-control bg-dark text-white border-info" placeholder="أدخل ميزانيتك هنا...">
                <button class="btn btn-execute px-4" onclick="activateLogic()">EXECUTE</button>
            </div>
        </div>

        <h3 class="mb-4 text-warning" style="border-right: 4px solid var(--neon-gold); padding-right: 15px;">المصفوفة التجارية الحية</h3>
        <div id="matrix" class="row g-4 mb-5"></div>
    </div>

    <script>
        const products = [
            { id: 101, name: "Xiaomi Redmi Note 13", price: "2100 DH", img: "https://p-ma.expertreviews.co.uk/sites/expertreviews/files/2024/02/xiaomi_redmi_note_13_pro_5g_review_0.jpg" },
            { id: 102, name: "Smart Watch Ultra", price: "450 DH", img: "https://m.media-amazon.com/images/I/71u9S+7D8PL._AC_SL1500_.jpg" },
            { id: 103, name: "AirPods Pro 2", price: "300 DH", img: "https://m.media-amazon.com/images/I/61SUj2W5yXL._AC_SL1500_.jpg" }
        ];

        function initGiant() {
            const grid = document.getElementById('matrix');
            grid.innerHTML = products.map(p => `
                <div class="col-6 col-md-4">
                    <div class="card scifi-card p-3 h-100 text-center text-white">
                        <img src="${p.img}" class="product-img img-fluid mx-auto mb-3" style="height: 120px; object-fit: contain;">
                        <h6 class="small">${p.name}</h6>
                        <h5 class="text-warning fw-bold">${p.price}</h5>
                        <a href="https://wa.me/212632997956?text=أريد طلب المنتج ${p.name}" class="btn btn-sm btn-outline-warning w-100 mt-2">اطلب عبر الواتساب</a>
                    </div>
                </div>
            `).join('');
        }

        function activateLogic() {
            const val = document.getElementById('aiInput').value;
            const res = document.getElementById('aiResponse');
            res.style.color = "var(--neon-gold)";
            if(val.includes('2000')) {
                res.innerHTML = "💡 تحليل: ميزانية ممتازة! أرشح لك Xiaomi Redmi Note 13، هل أجهز لك طلب الخصم؟";
            } else {
                res.innerHTML = "📡 جاري البحث في المصفوفة... تم العثور على صفقات تتوافق مع ترددك المالي.";
            }
        }

        initGiant();
    </script>
</body>
</html>
