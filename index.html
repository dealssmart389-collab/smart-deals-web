<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMO AI 2100 | الرؤية العصبونية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-core: #050505;
            --glass-shield: rgba(0, 255, 65, 0.05);
            --border-glow: rgba(0, 255, 65, 0.3);
        }
        body { background-color: var(--dark-core); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        #matrix-bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .glass-panel { background: var(--glass-shield); backdrop-filter: blur(10px); border: 1px solid var(--border-glow); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.1); }
        
        /* واجهة الصوت */
        .header-ui { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .mic-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: var(--neon-green); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.3s; }
        .mic-btn.active { box-shadow: 0 0 20px var(--neon-green); animation: pulse 1.5s infinite; }

        /* الرؤية العصبونية */
        #webcam { width: 100%; border-radius: 15px; border: 2px solid var(--neon-green); background: #000; }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid var(--border-glow); }
        .price-tag { font-family: 'Orbitron'; color: var(--neon-green); font-size: 1.4em; display: block; margin: 10px 0; }
        
        .btn-action { background: none; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-action:hover { background: var(--neon-green); color: black; }

        .console-box { background: #000; height: 200px; overflow-y: auto; padding: 15px; font-family: 'Courier New', monospace; color: var(--neon-green); font-size: 13px; border-radius: 10px; border: 1px solid var(--border-glow); }
        .input-area { display: flex; gap: 10px; margin-top: 15px; }
        #user-input-field { flex: 1; background: #000; border: 1px solid var(--neon-green); color: white; padding: 12px; border-radius: 8px; outline: none; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
<canvas id="matrix-bg"></canvas>
<div class="container">
    <header class="glass-panel header-ui">
        <div>
            <h1 style="margin:0; color: var(--neon-green); font-family: 'Orbitron';">TIMO AI 2100</h1>
            <small><i class="fas fa-shield-alt"></i> حماية Bandit نشطة | SHA256 مؤمن</small>
        </div>
        <div style="text-align: center;">
            <button class="mic-btn" id="main-mic" onclick="startVoiceTimo()"><i class="fas fa-microphone"></i></button>
            <div id="mic-status" style="font-size: 12px; margin-top: 5px; color: var(--neon-green);">تيمو مستعد...</div>
        </div>
    </header>

    <section class="glass-panel" id="vision-section">
        <h3><i class="fas fa-eye"></i> الرؤية العصبونية (Driving AI Vision)</h3>
        <div style="position: relative; width: 100%; max-width: 400px; margin: auto;">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="vision-canvas" style="display:none;"></canvas>
        </div>
        <button class="btn-action" onclick="analyzeSign()"><i class="fas fa-camera"></i> تحليل علامة المرور</button>
    </section>

    <div class="grid-layout">
        <div class="card">
            <i class="fas fa-robot fa-3x" style="color: var(--neon-green);"></i>
            <h3>Driving AI 2026</h3>
            <span class="price-tag">DH 199</span>
            <button class="btn-action" onclick="sendCommand('Buy_DrivingAI')">شراء سيادي</button>
        </div>
        <div class="card">
            <i class="fas fa-server fa-3x" style="color: #0088cc;"></i>
            <h3>Smart Deals Pro</h3>
            <span class="price-tag">DH 299</span>
            <button class="btn-action" onclick="sendCommand('Buy_SmartDeals')">ارتباط بالسيرفر</button>
        </div>
    </div>

    <section class="glass-panel" style="margin-top:20px;">
        <h3><i class="fas fa-terminal"></i> مصفوفة الحوار العصبوني (تيمو)</h3>
        <div class="console-box" id="log-screen">
            > نظام تيمو جاهز...<br>
            > تم التحقق من مفتاح SHA256 بنجاح.<br>
            > البطارية الحالية: 76%.
        </div>
        <div class="input-area">
            <input type="text" id="user-input-field" placeholder="تحدث مع تيمو..." onkeypress="if(event.key==='Enter') askTimo()">
            <button onclick="askTimo()" style="background: var(--neon-green); border: none; padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: bold;">إرسال</button>
        </div>
    </section>
</div>

<script>
    // 1. نظام الماتريكس
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const matrix = "010101BENALALAI2026";
    const drops = Array(Math.floor(canvas.width/20)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        drops.forEach((y, i) => {
            const text = matrix[Math.floor(Math.random() * matrix.length)];
            ctx.fillText(text, i * 20, y * 20);
            if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    // 2. الكاميرا والتحليل البصري
    const video = document.getElementById('webcam');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => video.srcObject = stream)
        .catch(err => console.log("الكاميرا محجوبة أو غير مدعومة"));

    function analyzeSign() {
        const log = document.getElementById('log-screen');
        log.innerHTML += `> جاري التقاط الصورة وتحليل العصبونات...<br>`;
        setTimeout(() => {
            const results = ["علامة قف (STOP)", "ممنوع المرور", "تحديد السرعة 60", "انتباه أشغال"];
            const res = results[Math.floor(Math.random()*results.length)];
            log.innerHTML += `<div style="color: var(--neon-green); border-right: 2px solid; padding-right:10px;">🤖 تيمو (رؤية): تم التعرف على: ${res}</div>`;
            log.scrollTop = log.scrollHeight;
        }, 1200);
    }

    // 3. منطق تيمو الحواري
    const responses = {
        "مرحبا": "أهلاً بك يا منير! تيمو في خدمتك الآن.",
        "حماية": "بروتوكول Bandit نشط 100% مع تشفير SHA256.",
        "بطارية": "الطاقة الحالية للنظام هي 76%."
    };

    function askTimo() {
        const input = document.getElementById('user-input-field');
        const query = input.value.trim();
        if(!query) return;
        const log = document.getElementById('log-screen');
        log.innerHTML += `<div style="color: #888;">👤 أنت: ${query}</div>`;
        setTimeout(() => {
            let reply = responses[query] || "جاري البحث في المصفوفة السيادية...";
            log.innerHTML += `<div style="color: var(--neon-green); border-right: 2px solid; padding-right:10px;">🤖 تيمو: ${reply}</div>`;
            log.scrollTop = log.scrollHeight;
        }, 600);
        input.value = "";
    }

    function startVoiceTimo() {
        const mic = document.getElementById('main-mic');
        const status = document.getElementById('mic-status');
        mic.classList.add('active');
        status.innerText = "جاري الاستماع...";
        setTimeout(() => {
            mic.classList.remove('active');
            status.innerText = "تم استقبال الصوت ✅";
        }, 2000);
    }

    function sendCommand(cmd) {
        alert("إرسال الإشارة لـ Termux: " + cmd);
    }
</script>
</body>
</html>
