<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART DEALS AI | DIAMOND v7.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --glitch-gold: #ffcc00; --deep-black: #020202; --neon-cyan: #00f2ff; }
        body { background: var(--deep-black); color: #fff; font-family: 'Tajawal', sans-serif; }
        
        /* تصميم الكارت الذكي */
        .smart-card {
            background: rgba(20, 20, 20, 0.8); border: 1px solid #333; border-radius: 15px;
            overflow: hidden; transition: 0.5s; position: relative;
        }
        .smart-card:hover { border-color: var(--glitch-gold); transform: scale(1.03) translateY(-10px); box-shadow: 0 0 40px rgba(255, 204, 0, 0.3); }
        
        /* تأثير التوهج للصور */
        .image-container { background: radial-gradient(circle, rgba(255,204,0,0.1) 0%, transparent 70%); padding: 20px; }
        .product-img { filter: drop-shadow(0 0 15px var(--glitch-gold)); max-height: 200px; object-fit: contain; transition: 0.3s; }
        
        /* شارة الحالة */
        .status-badge { position: absolute; top: 10px; right: 10px; background: var(--glitch-gold); color: #000; font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        
        /* زر الأكشن */
        .btn-order { background: linear-gradient(45deg, var(--glitch-gold), #ffaa00); color: #000; border: none; font-weight: bold; border-radius: 8px; }
        
        /* واجهة النبض العصبي */
        .neural-input { background: #111; border: 1px solid var(--neon-cyan); color: #fff; border-radius: 10px 0 0 10px; }
    </style>
</head>
<body>

    <div class="container py-5 text-center">
        <h1 style="color: var(--glitch-gold); font-weight: 900; letter-spacing: 2px;">SMART DEALS <span class="text-white">AI</span></h1>
        <p class="text-secondary small">OPERATING SYSTEM: TANGIER_CORE_v7.0</p>

        <div class="row justify-content-center my-5">
            <div class="col-md-8">
                <div class="p-4" style="border: 1px solid var(--neon-cyan); border-radius: 20px; background: rgba(0, 242, 255, 0.05);">
                    <h5 class="text-info mb-3">📡 محلل الصفقات العصبي</h5>
                    <p id="aiLogic" class="small text-white-50">"أخبرني بميزانيتك أو ماذا تفضل في الهاتف (كاميرا، ألعاب، بطارية).."</p>
                    <div class="input-group">
                        <input type="text" id="userInput" class="form-control neural-input" placeholder="مثلاً: بغيت هاتف ديال التصوير بـ 3500...">
                        <button class="btn btn-info px-4" style="border-radius: 0 10px 10px 0;" onclick="analyzeRequest()">تحليل</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="productGrid" class="row g-4">
            </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Redmi Note 13 Pro+ 5G", price: 4200, spec: "200MP + 120W", img: "https://i.imgur.com/8QxXW5X.png", tag: "الأقوى عالمياً" },
            { id: 2, name: "Redmi Note 13 Pro", price: 3100, spec: "200MP + 67W", img: "https://i.imgur.com/6XzW9vS.png", tag: "الأكثر مبيعاً" },
            { id: 3, name: "Redmi Note 13", price: 2100, spec: "108MP + AMOLED", img: "https://i.imgur.com/vH9v5Z7.png", tag: "أفضل قيمة" }
        ];

        function renderProducts(filterId = null) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="col-md-4" style="opacity: ${filterId && p.id !== filterId ? '0.3' : '1'}">
                    <div class="smart-card p-3 h-100">
                        <span class="status-badge">${p.tag}</span>
                        <div class="image-container">
                            <img src="${p.img}" class="product-img img-fluid">
                        </div>
                        <div class="stars my-2">⭐⭐⭐⭐⭐</div>
                        <h6 class="fw-bold">${p.name}</h6>
                        <p class="text-info small mb-1">${p.spec}</p>
                        <h4 style="color: var(--glitch-gold)">${p.price} DH</h4>
                        <a href="https://wa.me/212632997956?text=أريد طلب ${p.name}" class="btn btn-order w-100 mt-3">اطلب الآن</a>
                    </div>
                </div>
            `).join('');
        }

        function analyzeRequest() {
            const input = document.getElementById('userInput').value.toLowerCase();
            const log = document.getElementById('aiLogic');
            
            if(input.includes('تصوير') || input.includes('كاميرا')) {
                log.innerText = "💡 ذكاء اصطناعي: للصور الاحترافية، Redmi Note 13 Pro+ هو خيارك الأول بـ 200 ميجابكسل!";
                renderProducts(1);
            } else if(input.includes('2000') || input.includes('رخيص')) {
                log.innerText = "💡 ذكاء اصطناعي: ميزانية اقتصادية؟ Redmi Note 13 العادي هو البطل!";
                renderProducts(3);
            } else {
                log.innerText = "📡 جاري المسح... تم العثور على أفضل الهواتف المتوفرة في طنجة حالياً.";
                renderProducts();
            }
        }

        renderProducts();
    </script>
</body>
</html>
