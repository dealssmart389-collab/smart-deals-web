<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Marketplace Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --fb-hover: #3a3b3c; --neon: #00ff41; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 105px; overflow-x: hidden; }
        .header-fixed { position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--fb-card); }
        .navbar-top { height: 56px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; }
        .logo { color: var(--fb-blue); font-size: 24px; font-weight: bold; letter-spacing: -1px; }
        .nav-tabs { display: flex; height: 48px; border-bottom: 1px solid #3e4042; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; color: #b0b3b8; font-size: 20px; cursor: pointer; position: relative; }
        .tab.active { color: var(--fb-blue); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 3px; background: var(--fb-blue); }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        /* تصميم المتجر (Marketplace Grid) */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .market-item { background: var(--fb-card); border-radius: 8px; overflow: hidden; border: 1px solid #3e4042; }
        .market-img { width: 100%; height: 160px; background: #3a3b3c; object-fit: cover; }
        .market-info { padding: 8px; }
        .price { font-weight: bold; font-size: 16px; color: var(--fb-text); }
        .item-title { font-size: 13px; color: #b0b3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: var(--fb-bg); z-index: 2000; transition: 0.3s ease; padding: 15px; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        .icon-circle { background: var(--fb-hover); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--fb-text); cursor: pointer; }
    </style>
</head>
<body>
    <div class="header-fixed">
        <nav class="navbar-top">
            <div class="logo">BenalalAI</div>
            <div style="display: flex; gap: 10px;">
                <div class="icon-circle"><i class="fas fa-search"></i></div>
                <div class="icon-circle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
            </div>
        </nav>
        <div class="nav-tabs">
            <div class="tab" onclick="location.reload()"><i class="fas fa-home"></i></div>
            <div class="tab"><i class="fas fa-tv"></i></div>
            <div class="tab active"><i class="fas fa-store"></i></div>
            <div class="tab"><i class="fas fa-bell"></i></div>
        </div>
    </div>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>القائمة</h2>
            <i class="fas fa-times" style="font-size: 24px;" onclick="toggleMenu()"></i>
        </div>
        <div style="background: var(--fb-card); padding: 15px; border-radius: 10px; display: flex; align-items: center; gap: 12px;">
            <div style="width:40px; height:40px; background:var(--neon); border-radius:50%;"></div>
            <strong>منير بن علال (القائد)</strong>
        </div>
    </div>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 22px;">Marketplace</h2>
            <div style="color: var(--fb-blue); cursor: pointer;"><i class="fas fa-user"></i></div>
        </div>
        <div class="market-grid">
            <div class="market-item">
                <div class="market-img" style="background: url('https://via.placeholder.com/200/1877f2/ffffff?text=Smart+Deals+Offer') center/cover;"></div>
                <div class="market-info">
                    <div class="price">150 MAD</div>
                    <div class="item-title">تخفيضات Smart Deals الكبرى</div>
                </div>
            </div>
            <div class="market-item">
                <div class="market-img" style="background: url('https://via.placeholder.com/200/00ff41/000000?text=AI+Tool') center/cover;"></div>
                <div class="market-info">
                    <div class="price">مجانًا</div>
                    <div class="item-title">أداة Timo AI المحدثة 2026</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    </script>
</body>
</html>
