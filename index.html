<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Terminal Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --fb-hover: #3a3b3c; --neon: #00ff41; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 60px; }
        .navbar { background: var(--fb-card); height: 56px; border-bottom: 1px solid #3e4042; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--fb-blue); font-size: 24px; font-weight: bold; }
        .container { max-width: 500px; margin: auto; padding: 8px; }
        /* شريط القصص الأصلي */
        .stories { display: flex; gap: 8px; padding: 10px 0; overflow-x: auto; scrollbar-width: none; }
        .story-card { min-width: 110px; height: 180px; background: var(--fb-card); border-radius: 12px; border: 1px solid #3e4042; position: relative; overflow: hidden; flex-shrink: 0; }
        /* منشور تيمو المطور */
        .post-card { background: var(--fb-card); border-radius: 8px; padding: 12px; margin-top: 15px; border: 1px solid #3e4042; }
        .terminal-box { background: black; border-radius: 6px; padding: 15px; font-family: monospace; color: var(--neon); font-size: 13px; min-height: 100px; border: 1px solid #333; margin-bottom: 10px; }
        /* صندوق الإدخال الصغير أسفل المنشور */
        .command-input-area { display: flex; gap: 8px; background: var(--fb-hover); border-radius: 20px; padding: 5px 15px; align-items: center; }
        .cmd-input { flex: 1; background: none; border: none; color: white; padding: 8px; outline: none; font-size: 14px; }
        .send-btn { color: var(--fb-blue); cursor: pointer; font-size: 18px; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: var(--fb-bg); z-index: 2000; transition: 0.3s; padding: 20px; box-sizing: border-box; }
        .sidebar.active { right: 0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="background: var(--fb-hover); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        <div class="logo">BenalalAI</div>
        <div style="background: var(--fb-hover); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="fas fa-search"></i></div>
    </nav>
    <div class="container">
        <div class="stories">
            <div class="story-card" style="display:flex; align-items:center; justify-content:center; background:#1c1d1f;"><i class="fas fa-plus-circle" style="color:var(--fb-blue); font-size:30px;"></i></div>
            <div class="story-card" style="background: url('https://via.placeholder.com/110x180/1877f2/ffffff?text=Smart+Deals') center/cover;"></div>
        </div>
        <div class="post-card">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                <div style="width:40px; height:40px; background:var(--neon); border-radius:50%;"></div>
                <div><strong>تيمو (TIMO AI)</strong><br><small>نشط الآن</small></div>
            </div>
            <div class="terminal-box" id="terminal">
                > نظام بن علال متصل...<br>
                > بانتظار الأوامر السيادية...
            </div>
            <div class="command-input-area">
                <input type="text" id="cmd" class="cmd-input" placeholder="أدخل أمراً لنظام تيمو...">
                <i class="fas fa-paper-plane send-btn" onclick="sendCommand()"></i>
            </div>
        </div>
    </div>
    <div class="sidebar" id="sidebar">
        <h3 onclick="toggleMenu()">إغلاق القائمة</h3>
    </div>
    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        async function sendCommand() {
            const cmd = document.getElementById('cmd').value;
            if(!cmd) return;
            const term = document.getElementById('terminal');
            term.innerHTML += `<br><span style="color:white;">$ ${cmd}</span>`;
            // محاكاة استجابة تيمو
            setTimeout(() => {
                term.innerHTML += `<br>> جاري تنفيذ الأمر: ${cmd} عبر Termux... `;
                term.scrollTop = term.scrollHeight;
            }, 500);
            // إرسال للتلجرام إذا كانت الإعدادات محفوظة
            const token = localStorage.getItem('tgToken');
            const chatId = localStorage.getItem('tgChatId');
            if(token && chatId) {
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=Command: ${cmd}`);
            }
            document.getElementById('cmd').value = "";
        }
    </script>
</body>
</html>
