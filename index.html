<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BenalalAI - OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-top: 60px; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 2px solid var(--neon); position: fixed; top:0; width:100%; display: flex; justify-content: space-between; font-weight: bold; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .confirm-card { background: #1a1a1a; border: 1px solid var(--neon); border-radius: 10px; padding: 15px; margin-top: 20px; }
        .btn-check { background: var(--neon); color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #console { background: black; color: var(--neon); padding: 10px; height: 120px; overflow-y: auto; font-family: monospace; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <span>BENALAL AI</span>
        <i class="fas fa-microchip"></i>
    </div>
    <div class="container">
        <div id="console">> تم تفعيل نظام التأكيد (eGrow Strategy)...<br>> بانتظار معالجة الصفقات الجديدة.</div>
        <div class="confirm-card">
            <h4><i class="fab fa-whatsapp"></i> محاكي تأكيد الطلبات</h4>
            <p style="font-size: 0.9em; color: #aaa;">استراتيجية تقليل الإلغاءات مفعلة الآن.</p>
            <button class="btn-check" onclick="runStrategy()">تشغيل الروبوت</button>
        </div>
    </div>
    <script>
        function runStrategy() {
            const c = document.getElementById('console');
            c.innerHTML += "<br>> جاري إرسال رسالة التأكيد التلقائية...";
            setTimeout(() => { c.innerHTML += "<br>> ✅ تم التأكيد: العميل وافق على الطلب."; c.scrollTop = c.scrollHeight; }, 1000);
        }
    </script>
</body>
</html>
