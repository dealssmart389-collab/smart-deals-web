<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BenalalAI - Admin Node</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --panel: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        /* شاشة الأدمن المخفية */
        #admin-panel { display: none; background: var(--panel); border: 1px solid var(--neon); border-radius: 10px; padding: 20px; margin-top: 20px; box-shadow: 0 0 30px rgba(0,255,65,0.2); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #222; color: var(--neon); }
        .status-online { color: var(--neon); font-size: 12px; }
        #timo-shell { background: black; color: var(--neon); padding: 15px; height: 150px; overflow-y: auto; border-radius: 5px; font-family: monospace; border: 1px solid #333; }
        .secret-input { background: #222; border: 1px solid var(--neon); color: white; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: var(--neon); text-align: center;">BENALAL AI <small class="status-online">● ACTIVE</small></h2>
        <div id="timo-shell">> نظام بن علال بانتظار الشفرة...</div>
        <br>
        <input type="text" id="cmd-input" class="secret-input" placeholder="أدخل شفرة الوصول..." onkeypress="handleCmd(event)">
        <div id="admin-panel">
            <h3><i class="fas fa-user-shield"></i> لوحة الإدارة السيادية</h3>
            <p>سجل الصفقات المؤكدة في benalal_vault.db:</p>
            <table>
                <thead>
                    <tr>
                        <th>المعرف</th>
                        <th>العميل</th>
                        <th>النوع</th>
                        <th>الحالة</th>
                        <th>التوقيت</th>
                    </tr>
                </thead>
                <tbody id="db-content">
                    <tr>
                        <td>1</td>
                        <td>Mounir</td>
                        <td>Smart Deals</td>
                        <td style="color: var(--neon);">مؤكد ✅</td>
                        <td>2026-03-22</td>
                    </tr>
                </tbody>
            </table>
            <br>
            <button onclick="document.getElementById('admin-panel').style.display='none'" style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">إغلاق اللوحة الآمنة</button>
        </div>
    </div>
    <script>
        function handleCmd(e) {
            if (e.key === 'Enter') {
                const val = document.getElementById('cmd-input').value;
                const shell = document.getElementById('timo-shell');
                if (val === 'root-benalal-2026') {
                    shell.innerHTML += "<br>> <span style='color:white;'>[AUTH]:</span> تم قبول الشفرة. فتح لوحة الإدارة...";
                    document.getElementById('admin-panel').style.display = 'block';
                } else {
                    shell.innerHTML += "<br>> <span style='color:red;'>[ERROR]:</span> شفرة خاطئة. محاولة اختراق مرصودة.";
                }
                document.getElementById('cmd-input').value = '';
                shell.scrollTop = shell.scrollHeight;
            }
        }
    </script>
</body>
</html>
