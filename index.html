<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Deals AI | Global Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --gold: #eab308; --dark: #020617; }
        body { background: var(--dark); font-family: 'system-ui', sans-serif; overflow-x: hidden; }
        .ai-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.15); border: 1px solid rgba(234, 179, 8, 0.3); }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="text-white p-4">

    <div class="flex justify-between items-center mb-6 animate__animated animate__fadeInDown">
        <div>
            <h1 class="text-4xl font-black text-yellow-500 italic">SMART DEALS</h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                <p class="text-[10px] text-yellow-500 font-mono animate-pulse">AI ENGINE ACTIVE v6.1 GOLD</p>
            </div>
        </div>
        <div class="bg-yellow-500/10 p-3 rounded-2xl border border-yellow-500/20">
            <i class="fa-solid fa-microchip text-yellow-500"></i>
        </div>
    </div>

    <div id="ai-hub" class="glass-card rounded-[2rem] p-6 mb-8 ai-glow animate__animated animate__zoomIn">
        <div id="chat-box" class="h-32 overflow-y-auto mb-4 space-y-3 scrollbar-hide">
            <div class="text-yellow-500 font-bold text-sm">🌟 Gemini: "شريكي، أخبرني بميزانيتك وسأقوم بصنع عرض مستحيل لك الآن!"</div>
        </div>
        <div class="relative">
            <input type="text" id="user-ask" placeholder="مثلاً: أريد هاتف بـ 2000 درهم..." 
                class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 px-6 text-sm focus:border-yellow-500 transition-all outline-none">
            <button onclick="aiLogic()" class="absolute left-2 top-2 bg-yellow-500 text-black p-3 rounded-xl hover:scale-90 transition-transform">
                🚀
            </button>
        </div>
    </div>

    <div id="deals-wall" class="grid grid-cols-1 gap-4">
        </div>

    <script>
        // 🔔 محرك الإشعارات اللحظي (FOMO Engine)
const notifications = [
    "📦 شخص من الدار البيضاء اشترى Xiaomi Note 13 للتو!",
    "🔥 خصم سري تم تفعيله الآن لمستخدم من طنجة!",
    "✅ تم تأكيد طلب Smart Watch Ultra في مراكش"
];

function showLiveNotice() {
    const notice = document.createElement('div');
    notice.className = "fixed top-5 left-4 right-4 bg-yellow-500 text-black p-3 rounded-2xl text-[10px] font-bold shadow-2xl animate__animated animate__fadeInDown z-[100]";
    notice.innerHTML = notifications[Math.floor(Math.random() * notifications.length)];
    document.body.appendChild(notice);
    setTimeout(() => { notice.classList.replace('animate__fadeInDown', 'animate__fadeOutUp'); setTimeout(() => notice.remove(), 1000); }, 4000);
}

// 📲 إصلاح رابط الواتساب العالمي
function order(product) {
    const myNumber = "212628469956"; // تأكد من رقمك هنا
    const text = encodeURIComponent(`أهلاً Smart Deals، أريد طلب المنتج العالمي: ${product}`);
    // استخدام البروتوكول العالمي لضمان الفتح في كل المتصفحات
    const waUrl = `https://api.whatsapp.com/send?phone=${myNumber}&text=${text}`;
    
    window.location.href = waUrl; 
}

// تشغيل المحرك
window.onload = () => {
    renderDeals();
    setInterval(showLiveNotice, 15000); // إشعار كل 15 ثانية
};
    </script>
</body>
</html>
