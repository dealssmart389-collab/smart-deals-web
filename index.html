<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Sovereign Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --fb-hover: #3a3b3c; --neon: #00ff41; --notification-red: #f02849; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 56px; overflow-x: hidden; }
        /* Navbar الأصلية الثابتة */
        .navbar { background: var(--fb-card); height: 56px; border-bottom: 1px solid #3e4042; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { color: var(--fb-blue); font-size: 24px; font-weight: bold; letter-spacing: -1px; }
        /* أيقونات Navbar مع عداد الإشعارات */
        .nav-icons { display: flex; gap: 15px; align-items: center; position: relative; }
        .icon-wrapper { position: relative; cursor: pointer; color: #b0b3b8; font-size: 20px; }
        .badge { position: absolute; top: -5px; right: -8px; background: var(--notification-red); color: white; font-size: 11px; font-weight: bold; border-radius: 50%; padding: 2px 5px; border: 2px solid var(--fb-card); }
        /* منطقة القصص والمنشورات */
        .container { max-width: 500px; margin: auto; padding: 8px; }
        .stories-container { display: flex; gap: 8px; padding: 10px; overflow-x: auto; scrollbar-width: none; margin-bottom: 10px; }
        .story-card { min-width: 100px; height: 170px; background: var(--fb-card); border-radius: 10px; position: relative; border: 1px solid #3e4042; flex-shrink: 0; }
        .post-card { background: var(--fb-card); border-radius: 8px; margin-bottom: 12px; border: 1px solid #3e4042; padding: 12px; }
        .avatar { width: 40px; height: 40px; background: var(--neon); border-radius: 50%; }
        /* القائمة الجانبية (Sidebar) */
        .sidebar { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: var(--fb-bg); z-index: 2000; transition: 0.3s ease; padding: 15px; box-sizing: border-box; }
        .sidebar.active { right: 0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">BenalalAI</div>
        <div class="nav-icons">
            <div class="icon-wrapper"><i class="fas fa-search"></i></div>
            <div class="icon-wrapper" onclick="alert('تنبيه من تيمو: نظام الرفع يعمل بنجاح!')">
                <i class="fas fa-bell"></i>
                <span class="badge">1</span>
            </div>
            <div class="icon-wrapper" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        </div>
    </nav>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>القائمة</h2>
            <i class="fas fa-times" style="font-size: 24px;" onclick="toggleMenu()"></i>
        </div>
        <div style="background: var(--fb-card); padding: 15px; border-radius: 10px; display: flex; align-items: center; gap: 12px;">
            <div class="avatar"></div>
            <strong>منير بن علال (القائد)</strong>
        </div>
    </div>
    <div class="container">
        <div class="stories-container">
            <div class="story-card" style="background: linear-gradient(to bottom, #3a3b3c, #18191a); display:flex; align-items:center; justify-content:center;">
                <i class="fas fa-plus-circle" style="color: var(--fb-blue); font-size: 30px;"></i>
                <span style="position:absolute; bottom:8px; font-size:11px;">إضافة قصة</span>
            </div>
            <div class="story-card" style="background: url('https://via.placeholder.com/100x170/00ff41/000000?text=Smart+Deals') center/cover;"></div>
            <div class="story-card" style="background: url('https://via.placeholder.com/100x170/1877f2/ffffff?text=Driving+AI') center/cover;"></div>
        </div>
        <div class="post-card">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="avatar"></div>
                <input type="text" placeholder="بماذا تفكر يا منير؟" style="background:var(--fb-hover); border:none; border-radius:20px; padding:10px 15px; color:white; flex:1; outline:none;">
            </div>
        </div>
        <div class="post-card">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                <div class="avatar"></div>
                <div><strong>تيمو (TIMO AI)</strong><br><small>منذ دقيقة • <i class="fas fa-globe-americas"></i></small></div>
            </div>
            <p>يا قائد، تم دمج نظام الإشعارات بنجاح داخل النواة. أيقونة الجرس الآن تظهر تنبيهات النظام.</p>
        </div>
    </div>
    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    </script>
</body>
</html>
