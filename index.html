<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Integrated Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --neon: #00ff41; }
        body { background: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 105px; }
        /* الهيدر العلوي الموحد */
        .navbar-top { position: fixed; top: 0; width: 100%; height: 56px; background: var(--fb-card); display: flex; justify-content: space-between; align-items: center; padding: 0 16px; z-index: 2000; box-sizing: border-box; }
        .nav-tabs { position: fixed; top: 56px; width: 100%; height: 48px; background: var(--fb-card); display: flex; border-bottom: 1px solid #3e4042; z-index: 2000; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; color: #b0b3b8; font-size: 20px; cursor: pointer; position: relative; }
        .tab.active { color: var(--fb-blue); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 3px; background: var(--fb-blue); }
        .page { display: none; padding: 12px; max-width: 500px; margin: auto; }
        .page.active { display: block; }
        /* تنسيق المتجر (Marketplace) */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .market-item { background: var(--fb-card); border-radius: 8px; overflow: hidden; border: 1px solid #3e4042; position: relative; height: 250px; }
        .price-tag { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; }
        /* تنسيق نواة تيمو (Core) */
        .terminal-box { background: black; border-radius: 8px; padding: 15px; font-family: monospace; color: var(--neon); height: 300px; overflow-y: auto; border: 1px solid #333; margin-top: 10px; }
        .action-btn { width: 100%; background: var(--fb-blue); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="navbar-top">
        <div style="background: var(--fb-hover); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="fas fa-bars"></i></div>
        <div style="color: var(--fb-blue); font-size: 22px; font-weight: bold;">BenalalAI</div>
        <div id="statusDot" style="width:10px; height:10px; border-radius:50%; background:gray;"></div>
    </div>
    <div class="nav-tabs">
        <div class="tab" onclick="switchTab('notif', this)"><i class="fas fa-bell"></i></div>
        <div class="tab active" onclick="switchTab('market', this)"><i class="fas fa-store"></i></div>
        <div class="tab" onclick="switchTab('core', this)"><i class="fas fa-microchip"></i></div>
        <div class="tab" onclick="switchTab('home', this)"><i class="fas fa-home"></i></div>
    </div>
    <div id="market" class="page active">
        <h2 style="font-size: 20px;">Marketplace</h2>
        <div class="market-grid">
            <div class="market-item">
                <div style="height:100%; background:#2a2b2c; display:flex; align-items:center; justify-content:center; color:#555;">Image</div>
                <div class="price-tag">مجاناً</div>
                <div style="position:absolute; bottom:35px; left:10px; font-size:12px;">أداة Timo AI المحدثة</div>
            </div>
            <div class="market-item">
                <div style="height:100%; background:#2a2b2c; display:flex; align-items:center; justify-content:center; color:#555;">Image</div>
                <div class="price-tag">MAD 150</div>
                <div style="position:absolute; bottom:35px; left:10px; font-size:12px;">تخفيضات Smart Deals</div>
            </div>
        </div>
    </div>
    <div id="core" class="page">
        <div style="background: var(--fb-card); padding: 12px; border-radius: 8px; border: 1px solid #3e4042;">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:40px; height:40px; background:var(--neon); border-radius:50%; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold;">T</div>
                <div><strong>تيمو (TIMO AI)</strong><br><small>فحص النواة نشط</small></div>
            </div>
            <div class="terminal-box" id="termOutput">
                > نظام بن علال متصل...<br>
                > جاهز لجرد الملفات الحقيقية.
            </div>
            <button class="action-btn" onclick="executeAudit()">إجراء فحص شامل للملفات</button>
        </div>
    </div>
    <script>
        function switchTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        async function executeAudit() {
            const out = document.getElementById('termOutput');
            out.innerHTML += "<br>> جاري تنفيذ أمر ls -R...";
            try {
                const res = await fetch('http://localhost:5000/exec', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: 'ls'})
                });
                const data = await res.json();
                out.innerHTML += `<br><pre style="color:cyan;">${data.output}</pre>`;
            } catch {
                out.innerHTML += "<br><span style='color:red;'>! خطأ في الاتصال بالسيرفر.</span>";
            }
            out.scrollTop = out.scrollHeight;
        }
    </script>
</body>
</html>
