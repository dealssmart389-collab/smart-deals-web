<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART DEALS AI | TITAN v8.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --cyan: #00f2ff; --void: #020202; }
        body { background: var(--void); color: #fff; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        
        /* تأثيرات الخلفية العصبية */
        .neural-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.1;
            background: radial-gradient(circle, var(--gold) 1px, transparent 1px); background-size: 40px 40px; }

        /* الكروت الذكية */
        .beast-card {
            background: rgba(15, 15, 15, 0.9); border: 1px solid #333; border-radius: 20px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden;
        }
        .beast-card:hover { border-color: var(--gold); box-shadow: 0 0 50px rgba(255, 204, 0, 0.2); transform: scale(1.05); }
        
        /* خوارزمية عرض الصور */
        .img-engine { height: 180px; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .product-img { max-height: 100%; filter: drop-shadow(0 0 10px rgba(0,242,255,0.5)); transition: 0.4s; }
        
        /* واجهة التحكم الذكية */
        .ai-terminal { border: 2px solid var(--cyan); border-radius: 15px; background: rgba(0, 242, 255, 0.03); padding: 20px; }
        .status-pulse { width: 10px; height: 10px; background: #0f0; border-radius: 50%; display: inline-block; 
            box-shadow: 0 0 10px #0f0; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="neural-bg"></div>

    <div class="container py-4">
        <header class="text-center mb-5">
            <h1 style="color: var(--gold); font-weight: 900; text-shadow: 0 0 20px var(--gold);">SMART DEALS AI <span class="badge bg-warning text-dark">v8.0</span></h1>
            <p class="small text-uppercase"><span class="status-pulse"></span> Neural Link Active | Tangier Server</p>
        </header>

        <div class="ai-terminal mb-5 shadow-lg">
            <h5 class="text-info"><i class="bi bi-cpu"></i> معالج القرارات الذكي (Gemini Core)</h5>
            <p id="aiLog" class="text-white-50 small">"أنا أقرأ السوق الآن.. أخبرني ماذا يدور في ذهنك؟"</p>
            <div class="input-group">
                <input type="text" id="userInput" class="form-control bg-dark text-white border-info" placeholder="مثلاً: بغيت أحسن تصوير بـ 4000 درهم...">
                <button class="btn btn-info fw-bold" onclick="smartSearch()">تحليل ومسح</button>
            </div>
        </div>

        <div id="matrixGrid" class="row g-4"></div>
    </div>

    <script>
        // مصفوفة الصور الذكية مع روابط CDN متعددة كحماية (Fallback System)
        const SMART_ASSETS = {
            note13pp: "https://i.imgur.com/8QxXW5X.png",
            note13p: "https://i.imgur.com/6XzW9vS.png",
            note13: "https://i.imgur.com/vH9v5Z7.png",
            fallback: "https://via.placeholder.com/300x300/111/ffd700?text=SMART+DEALS+AI"
        };

        const inventory = [
            { id: 1, name: "Redmi Note 13 Pro+ 5G", price: 4200, category: "ultra", img: SMART_ASSETS.note13pp, desc: "كاميرا 200MP وشحن خارق 120W" },
            { id: 2, name: "Redmi Note 13 Pro", price: 3100, category: "pro", img: SMART_ASSETS.note13p, desc: "بطل الأداء والتصوير الليلي" },
            { id: 3, name: "Redmi Note 13 4G", price: 2100, category: "standard", img: SMART_ASSETS.note13, desc: "الأناقة والاقتصاد في هاتف واحد" }
        ];

        // خوارزمية الرندرة الذكية التي تعالج مشاكل الصور تلقائياً
        function renderMatrix(data) {
            const grid = document.getElementById('matrixGrid');
            grid.innerHTML = data.map(p => `
                <div class="col-md-4">
                    <div class="beast-card p-3 h-100">
                        <div class="img-engine">
                            <img src="${p.img}" class="product-img img-fluid" onerror="this.src='${SMART_ASSETS.fallback}'">
                        </div>
                        <div class="text-center mt-3">
                            <div style="color:var(--gold); font-size: 12px;">⭐⭐⭐⭐⭐</div>
                            <h6 class="fw-bold my-2">${p.name}</h6>
                            <p class="text-info extra-small" style="font-size: 10px;">${p.desc}</p>
                            <h4 class="fw-bold" style="color: var(--gold)">${p.price} DH</h4>
                            <a href="https://wa.me/212632997956?text=أريد حجز ${p.name}" class="btn btn-outline-warning btn-sm w-100 mt-3">حجز عبر النبض العصبي</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // خوارزمية التحليل اللغوي الذكي
        function smartSearch() {
            const val = document.getElementById('userInput').value.toLowerCase();
            const log = document.getElementById('aiLog');
            
            log.innerHTML = "<span class='text-info'>جاري تحليل الترددات المالية...</span>";
            
            setTimeout(() => {
                let filtered = inventory;
                if(val.includes('تصوير') || val.includes('200')) {
                    filtered = inventory.filter(p => p.price > 3000);
                    log.innerText = "💡 نتيجة التحليل: Redmi Note 13 Pro+ هو خيارك الأقوى للتصوير الاحترافي.";
                } else if(val.includes('رخيص') || val.includes('2000')) {
                    filtered = inventory.filter(p => p.price < 2500);
                    log.innerText = "💡 نتيجة التحليل: Redmi Note 13 يوفر لك أفضل أداء بأقل ثمن.";
                } else {
                    log.innerText = "📡 تم مسح المصفوفة.. إليك أفضل العروض المتاحة حالياً.";
                }
                renderMatrix(filtered);
            }, 800);
        }

        // الإطلاق الأول
        window.onload = () => renderMatrix(inventory);
    </script>
</body>
</html>
