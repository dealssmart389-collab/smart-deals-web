<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenalalAI - Interactive Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #18191a; --fb-card: #242526; --fb-text: #e4e6eb; --fb-hover: #3a3b3c; --neon: #00ff41; }
        body { background-color: var(--fb-bg); color: var(--fb-text); font-family: sans-serif; margin: 0; padding-top: 105px; overflow-x: hidden; }
        .header-fixed { position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--fb-card); }
        .navbar-top { height: 56px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; }
        .logo { color: var(--fb-blue); font-size: 24px; font-weight: bold; }
        .nav-tabs { display: flex; height: 48px; border-bottom: 1px solid #3e4042; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; color: #b0b3b8; font-size: 20px; cursor: pointer; position: relative; }
        .tab.active { color: var(--fb-blue); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 3px; background: var(--fb-blue); }
        /* الأقسام - مخفية افتراضياً */
        .page-section { display: none; padding: 10px; max-width: 500px; margin: auto; }
        .page-section.active { display: block; }
        /* تصميمات البطاقات الموحدة */
        .card { background: var(--fb-card); border-radius: 8px; margin-bottom: 12px; border: 1px solid #3e4042; padding: 12px; }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .market-item { background: var(--fb-card); border-radius: 8px; overflow: hidden; border: 1px solid #3e4042; }
        .icon-circle { background: var(--fb-hover); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: var(--fb-bg); z-index: 2000; transition: 0.3s; padding: 20px; }
        .sidebar.active { right: 0; }
    </style>
</head>
<body>
    <div class="header-fixed">
        <nav class="navbar-top">
            <div class="logo">BenalalAI</div>
            <div style="display: flex; gap: 10px;">
                <div class="icon-circle" onclick="alert('نظام البحث قيد التحميل...')"><i class="fas fa-search"></i></div>
                <div class="icon-circle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
            </div>
        </nav>
        <div class="nav-tabs">
            <div class="tab active" onclick="showSection('home', this)"><i class="fas fa-home"></i></div>
            <div class="tab" onclick="showSection('watch', this)"><i class="fas fa-tv"></i></div>
            <div class="tab" onclick="showSection('market', this)"><i class="fas fa-store"></i></div>
            <div class="tab" onclick="showSection('notif', this)"><i class="fas fa-bell"></i></div>
        </div>
    </div>
    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 style="margin:0;">القائمة</h2>
            <i class="fas fa-times" style="font-size: 24px;" onclick="toggleMenu()"></i>
        </div>
        <div class="card" style="display: flex; align-items: center; gap: 12px;">
            <div style="width:40px; height:40px; background:var(--neon); border-radius:50%;"></div>
            <strong>منير بن علال (القائد)</strong>
        </div>
    </div>
    <div id="home" class="page-section active">
        <div class="card">
            <p>مرحباً يا قائد، أنت في الصفحة الرئيسية الآن.</p>
        </div>
    </div>
    <div id="watch" class="page-section">
        <h3 style="margin-top:0;">Watch</h3>
        <div class="card" style="height: 200px; background: #000; display:flex; align-items:center; justify-content:center;">
            <i class="fas fa-play" style="font-size: 40px;"></i>
        </div>
    </div>
    <div id="market" class="page-section">
        <h3 style="margin-top:0;">Marketplace</h3>
        <div class="market-grid">
            <div class="market-item">
                <div style="height:150px; background:#3a3b3c;"></div>
                <div style="padding:8px;"><strong>150 MAD</strong><br><small>Smart Deals</small></div>
            </div>
            <div class="market-item">
                <div style="height:150px; background:#3a3b3c;"></div>
                <div style="padding:8px;"><strong>مجاني</strong><br><small>Timo AI</small></div>
            </div>
        </div>
    </div>
    <div id="notif" class="page-section">
        <h3 style="margin-top:0;">Notifications</h3>
        <div class="card">لا توجد إشعارات جديدة من Termux حالياً.</div>
    </div>
    <script>
        function showSection(sectionId, element) {
            // إخفاء كل الأقسام
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            // إظهار القسم المطلوب
            document.getElementById(sectionId).classList.add('active');
            // تحديث حالة التبويب النشط
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
        }
        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('active'); 
        }
    </script>
</body>
</html>
