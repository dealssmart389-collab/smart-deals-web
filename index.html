<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Deals v6.1 GOLD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .gold-text { color: #FFD700; }
        .ai-engine-header { border-bottom: 2px solid #FFD700; padding: 20px; text-align: center; }
        .gemini-box { background: rgba(255, 215, 0, 0.1); border: 1px solid #FFD700; border-radius: 15px; padding: 20px; margin: 20px 0; }
        .product-card { background: #111; border: 1px solid #333; transition: 0.3s; height: 100%; }
        .product-card:hover { border-color: #FFD700; transform: translateY(-5px); }
        .badge-status { background-color: #FFD700; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ai-engine-header">
        <h1 class="gold-text fw-bold">SMART DEALS</h1>
        <p class="small">AI ENGINE ACTIVE v6.1 GOLD <span class="text-success">●</span></p>
    </div>

    <div class="container">
        <div class="gemini-box text-center">
            <h5 class="gold-text">🌟 Gemini: "شريكي، أخبرني بميزانيتك وسأقوم بصنع عرض مستحيل لك الآن!"</h5>
            <div class="input-group mt-3">
                <input type="text" id="userBudget" class="form-control bg-dark text-white border-warning" placeholder="مثلاً: أريد هاتف بـ 2000 درهم...">
                <button class="btn btn-warning" onclick="askAI()">🚀</button>
            </div>
        </div>

        <h3 class="gold-text mb-4">أقوى العروض الحالية في المغرب</h3>
        <div id="product-grid" class="row g-3">
            </div>
    </div>

    <script>
        // مصفوفة المنتجات العالمية (يمكنك تعديل الأسعار والروابط هنا)
        const products = [
            { name: "Xiaomi Redmi Note 13", price: "2100 DH", status: "الأكثر طلباً", img: "https://p-ma.expertreviews.co.uk/sites/expertreviews/files/2024/02/xiaomi_redmi_note_13_pro_5g_review_0.jpg" },
            { name: "Smart Watch Ultra", price: "450 DH", status: "خصم 50%", img: "https://m.media-amazon.com/images/I/71u9S+7D8PL._AC_SL1500_.jpg" },
            { name: "AirPods Pro 2", price: "300 DH", status: "هدية", img: "https://m.media-amazon.com/images/I/61SUj2W5yXL._AC_SL1500_.jpg" }
        ];

        function displayProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="col-6 col-md-4">
                    <div class="card product-card text-white">
                        <span class="badge badge-status position-absolute m-2">${p.status}</span>
                        <img src="${p.img}" class="card-img p-3" style="height: 150px; object-fit: contain;">
                        <div class="card-body p-2 text-center">
                            <h6 class="small text-truncate">${p.name}</h6>
                            <p class="gold-text fw-bold mb-2">${p.price}</p>
                            <a href="https://wa.me/212632997956?text=أريد طلب ${p.name}" class="btn btn-sm btn-outline-warning w-100">اطلب الآن</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function askAI() {
            const budget = document.getElementById('userBudget').value;
            if(budget) alert("جاري تحليل ميزانيتك: " + budget + "... سيقوم مستشارك الذكي بالرد عليك فوراً!");
        }

        displayProducts();
    </script>

</body>
</html>
