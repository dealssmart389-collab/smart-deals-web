<ion-content class="ion-padding">
  <div class="section-title">
    <h2>مخزن الشركات العالمية</h2>
  </div>

  <ion-card class="neural-card">
    <img [src]="currentProduct.image" style="width: 100%; height: 250px; object-fit: cover;" />
    
    <ion-card-header>
      <ion-card-title>{{ currentProduct.title }}</ion-card-title>
      <h3>DH {{ currentProduct.price }}</h3>
    </ion-card-header>

    <ion-button expand="block" class="pay-button" (click)="buyNow(currentProduct.url)">
      إتمام الدفع الكوني 🚀
    </ion-button>
  </ion-card>
</ion-content>
