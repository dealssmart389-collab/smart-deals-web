<ion-content [fullscreen]="true" style="--background: #000;">
  <div class="analysis-header">
    <h1 style="color: #00e5ff; text-align: center; font-weight: 800;">رادار الصفقات الكوني</h1>
    <p style="color: #fff; text-align: center;">أنت تبحث.. والذكاء يحلل المصفوفة</p>
  </div>

  <div class="search-box">
    <ion-item fill="outline" mode="md" style="--border-color: #00e5ff;">
      <ion-input [(ngModel)]="searchQuery" placeholder="ماذا تريد أن تعرف اليوم؟"></ion-input>
      <ion-button slot="end" (click)="startQuantumAnalysis()" fill="clear">
        <ion-icon name="scan-outline" slot="icon-only" color="primary"></ion-icon>
      </ion-button>
    </ion-item>
  </div>

  <ion-card *ngIf="analysisResult" class="result-card">
    <ion-card-header>
      <ion-card-title color="secondary">تحليل المنتج: {{ analysisResult.name }}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list lines="none" style="background: transparent;">
        <ion-item><ion-label>أفضل سعر عالمي: {{ analysisResult.bestPrice }}</ion-label></ion-item>
        <ion-item><ion-label>دقة التحليل: {{ analysisResult.reliability }}</ion-label></ion-item>
        <ion-item><ion-label>المصدر: {{ analysisResult.source }}</ion-label></ion-item>
      </ion-list>
      <div class="ai-recommendation">
        <strong>توصية منير بن علال:</strong> {{ analysisResult.recommendation }}
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
