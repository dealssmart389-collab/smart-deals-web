<ion-header>
  <ion-toolbar color="primary">
    <ion-title>🔱 Smart Deals Admin</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>إرسال عرض جديد للقناة</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item lines="outline">
        <ion-label position="stacked">نص الإعلان (يدعم HTML)</ion-label>
        <ion-textarea [(ngModel)]="adMessage" rows="6" placeholder="اكتب تفاصيل العرض هنا..."></ion-textarea>
      </ion-item>
      <ion-button expand="block" color="success" class="ion-margin-top" (click)="sendTelegramAd()">
        <ion-icon name="paper-plane-outline" slot="start"></ion-icon>
        نشر العرض الآن
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
