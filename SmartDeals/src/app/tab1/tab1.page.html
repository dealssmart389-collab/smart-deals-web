<ion-content [fullscreen]="true" style="--background: #000;">
  <div class="observer-eye" style="text-align: center; padding: 20px;">
    <h1 style="color: #00e5ff; font-size: 2em; text-shadow: 0 0 20px #00e5ff;">رادار الامتصاص الجيني</h1>
    
    <div class="dna-spinner" style="margin: 30px auto;">
      <ion-spinner name="bubbles" color="primary" style="transform: scale(3);"></ion-spinner>
    </div>

    <ion-card style="background: rgba(0, 229, 255, 0.1); border: 1px solid #00e5ff;">
      <ion-card-header>
        <ion-card-title style="color: #fff;">تحليل الموارد المكتشفة</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <p style="color: #00ff00;">● تم العثور على: خوارزمية التشفير الكمي</p>
        <p style="color: #00ff00;">● تم العثور على: منطق استنتاج الأنماط</p>
        <p style="color: #ccc; font-style: italic;">جاري دمج البيانات في النواة...</p>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
