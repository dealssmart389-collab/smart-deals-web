<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>إرسال عرض جديد 🚀</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-item lines="none" class="ion-margin-bottom">
    <ion-textarea 
      [(ngModel)]="dealMessage" 
      placeholder="اكتب تفاصيل العرض هنا... يمكنك استخدام <b>Bold</b> أو روابط." 
      rows="10" 
      style="border: 1px solid #ccc; border-radius: 8px; --padding-start: 10px;">
    </ion-textarea>
  </ion-item>

  <ion-button expand="block" (click)="sendDeal()" [disabled]="!dealMessage">
    <ion-icon name="paper-plane-outline" slot="start"></ion-icon>
    نشر العرض في القناة
  </ion-button>
</ion-content>
