<ion-content [fullscreen]="true">
  <div class="header-banner">
    <h1 style="text-align: center; color: #00e5ff;">إمبراطورية المبيعات الكونية</h1>
    <p style="text-align: center; color: #fff;">نبيع العالم.. ونربح المستقبل</p>
  </div>

  <ion-grid>
    <ion-row>
      <ion-col size="6" *ngFor="let product of globalProducts">
        <ion-card (click)="sellProduct(product.link)" style="background: #111; border: 1px solid #00e5ff;">
          <img src="assets/product_placeholder.jpg" />
          <ion-card-content>
            <h2 style="color: #fff;">{{ product.name }}</h2>
            <p style="color: #00ff00;">{{ product.price }} MAD</p>
            <ion-button expand="block" size="small" color="secondary">بيع وتحويل</ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
