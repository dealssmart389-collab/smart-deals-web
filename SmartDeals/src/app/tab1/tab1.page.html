<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title style="text-align: right; font-weight: bold;">Smart Deals - طنجة</ion-title>
    <ion-buttons slot="start">
      <ion-button>
        <ion-icon slot="icon-only" name="cart-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div style="background: linear-gradient(to bottom, #1a1a1a, #4a4a4a); color: white; padding: 30px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;">
    <h1 style="margin: 0; font-size: 24px;">نظام القوة الخالدة</h1>
    <p style="opacity: 0.8;">أفضل عروض الهواتف الذكية بين يديك</p>
  </div>

  <ion-list lines="none" style="padding: 10px;">
    <ion-card style="border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
      <img alt="Galaxy S24 Ultra" src="https://ionicframework.com/docs/img/demos/card-media.png" />
      <ion-card-header>
        <ion-card-title>Galaxy S24 Ultra</ion-card-title>
        <ion-card-subtitle color="success" style="font-size: 18px; font-weight: bold;">9,999 DH</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        استمتع بأقوى أداء مع شاشة Dynamic AMOLED وكاميرا احترافية.
      </ion-card-content>
      <ion-button expand="block" shape="round" color="dark" style="margin: 10px;">
        إتمام الدفع الكوني
      </ion-button>
    </ion-card>
  </ion-list>
</ion-content>
