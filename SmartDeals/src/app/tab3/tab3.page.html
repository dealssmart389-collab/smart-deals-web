<ion-content [fullscreen]="true" style="--background: radial-gradient(circle, #001d3d 0%, #000 100%);">
  <div class="quantum-core">
    <div class="orbit-container">
      <div class="core-sun">M</div>
      <div class="data-planet">Data</div>
    </div>
    
    <div class="stats-panel">
      <h2 style="color: #00e5ff;">تحليل الأبعاد الحية</h2>
      <p style="color: #fff;">استجابة النواة: <span style="color: #00ff00;">{{ latency }}</span></p>
      <p style="color: #fff;">حالة المدار: <span style="color: #00e5ff;">{{ quantumStatus }}</span></p>
    </div>

    <ion-button expand="block" color="tertiary" style="margin-top: 50px;">
      تفعيل بروتوكول 2100
    </ion-button>
  </div>
</ion-content>
