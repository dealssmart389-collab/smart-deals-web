<ion-content [fullscreen]="true" style="--background: #000;">
  <div class="commander-header" style="text-align: center; padding: 30px;">
    <h1 style="color: #00e5ff; font-weight: 800;">غرفة العمليات - 2100</h1>
    <p style="color: #ccc;">القائد: منير بن علال</p>
  </div>

  <ion-list lines="none" style="background: transparent;">
    <ion-item class="stats-card">
      <ion-label>
        <h2 style="color: #fff;">عمليات البحث اليوم</h2>
        <p style="color: #00ff00; font-size: 24px;">+ 1,240,500</p>
      </ion-label>
      <ion-icon name="analytics-outline" slot="end" color="primary"></ion-icon>
    </ion-item>

    <ion-button expand="block" (click)="sendIntelToCommander('تقرير الصباح: الرادار رصد 50 صفقة ذهبية')" style="margin: 20px;">
      إرسال تقرير الأرباح إلى Telegram
    </ion-button>
  </ion-list>
</ion-content>
