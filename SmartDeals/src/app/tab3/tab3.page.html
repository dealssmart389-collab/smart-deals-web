<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title style="text-align: right; letter-spacing: 2px;">مركز القيادة الكوني</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="command-center">
    <div class="avatar-glow">
      <ion-avatar>
        <img src="assets/profile.jpg" />
      </ion-avatar>
    </div>
    
    <h1 class="commander-name">منير بن علال</h1>
    <p class="system-time">توقيت النظام: {{ systemUptime }}</p>

    <ion-list lines="none" class="action-list">
      <ion-item button (click)="launchProtocol('تعديل المصفوفة')" class="quantum-item">
        <ion-label>تعديل الملف الشخصي</ion-label>
        <ion-icon name="finger-print-outline" slot="start"></ion-icon>
      </ion-item>

      <ion-item button (click)="launchProtocol('توليد الجواهر')" class="quantum-item">
        <ion-label>بنك الجواهر الرقمية</ion-label>
        <ion-icon name="diamond-outline" slot="start"></ion-icon>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
