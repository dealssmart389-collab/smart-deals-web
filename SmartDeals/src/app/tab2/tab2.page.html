<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title>العنان: الإصدارات العالمية</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <ion-card style="background: #1a1a1a; color: gold; border-radius: 15px;">
    <img src="assets/product-sample.jpg" /> <ion-card-header>
      <ion-card-title style="color: gold;">اسم المنتج من AliExpress</ion-card-title>
      <ion-card-subtitle color="warning">4200 DH</ion-card-subtitle>
    </ion-card-header>

    <ion-button expand="block" color="danger" (click)="openAliExpress('رابط_المنتج_هنا')">
      إتمام الطلب عبر AliExpress 🚀
    </ion-button>
  </ion-card>
</ion-content>
<ion-content class="ion-padding">
  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6" *ngFor="let p of products">
        <ion-card mode="ios">
          <img [src]="p.image" style="height: 200px; object-fit: cover; width: 100%;" />
          <ion-card-header>
            <ion-card-subtitle>{{ p.tag }}</ion-card-subtitle>
            <ion-card-title>{{ p.name }}</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <h2 color="success">{{ p.price }}</h2>
            <ion-button expand="block" shape="round">اكتشف الآن</ion-button>
          </ion-card-content>
        </ion-card>
<ion-content class="ion-padding">
  <ion-item class="search-box" lines="none" style="--background: #121212; border: 1px solid #ffd700; border-radius: 15px; margin-bottom: 20px;">
    <ion-input #aliUrl placeholder="الصق رابط AliExpress هنا..." style="color: white;"></ion-input>
    <ion-button slot="end" fill="clear" (click)="fetchProduct(aliUrl.value)">
      <ion-icon name="search-outline" style="color: #ffd700;"></ion-icon>
    </ion-button>
  </ion-item>

  <div class="section-title">
    <h2 style="color: #00d2ff;">مخزن الشركات العالمية</h2>
  </div>

  <ion-card class="neural-card">
    </ion-card>
</ion-content>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
